<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="450" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#232F3E">DynamoDB Internal Architecture</text>

  <!-- Application Layer -->
  <rect x="50" y="55" width="800" height="80" fill="#E8F4F8" stroke="#0073BB" stroke-width="2" rx="8"/>
  <text x="450" y="78" font-size="13" font-weight="bold" text-anchor="middle" fill="#0073BB">Application Layer</text>
  <rect x="130" y="88" width="130" height="32" fill="#FF9900" stroke="#E07A00" stroke-width="1.5" rx="4"/>
  <text x="195" y="109" font-size="11" font-weight="bold" text-anchor="middle" fill="white">EC2 / Lambda</text>
  <rect x="310" y="88" width="130" height="32" fill="#FF9900" stroke="#E07A00" stroke-width="1.5" rx="4"/>
  <text x="375" y="109" font-size="11" font-weight="bold" text-anchor="middle" fill="white">ECS / EKS</text>
  <rect x="490" y="88" width="130" height="32" fill="#FF9900" stroke="#E07A00" stroke-width="1.5" rx="4"/>
  <text x="555" y="109" font-size="11" font-weight="bold" text-anchor="middle" fill="white">On-premises App</text>
  <text x="660" y="104" font-size="10" fill="#555">AWS SDK / HTTP API</text>

  <!-- Arrow down to Router -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#232F3E"/>
    </marker>
  </defs>
  <line x1="450" y1="135" x2="450" y2="158" stroke="#232F3E" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="152" font-size="10" fill="#555">HTTPS</text>

  <!-- Request Router -->
  <rect x="200" y="160" width="500" height="45" fill="#527FFF" stroke="#2E5FAF" stroke-width="2" rx="6"/>
  <text x="450" y="178" font-size="13" font-weight="bold" text-anchor="middle" fill="white">DynamoDB Request Router</text>
  <text x="450" y="196" font-size="10" text-anchor="middle" fill="#dce8ff">Authenticates requests · Routes to correct partition · Handles retries</text>

  <!-- Arrows to partitions -->
  <line x1="200" y1="205" x2="140" y2="248" stroke="#232F3E" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="205" x2="450" y2="248" stroke="#232F3E" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="205" x2="760" y2="248" stroke="#232F3E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Partition 1 -->
  <rect x="30" y="250" width="230" height="280" fill="#FFF8E7" stroke="#D45B07" stroke-width="2" rx="8"/>
  <text x="145" y="272" font-size="12" font-weight="bold" text-anchor="middle" fill="#D45B07">Partition 1</text>
  <text x="145" y="288" font-size="10" text-anchor="middle" fill="#888">Key hash range: 0x0000–0x5555</text>
  <rect x="50" y="298" width="190" height="60" fill="#527FFF" stroke="#2E5FAF" stroke-width="1.5" rx="4"/>
  <text x="145" y="320" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Primary Node</text>
  <text x="145" y="338" font-size="10" text-anchor="middle" fill="#dce8ff">Read + Write  ·  AZ us-east-1a</text>
  <line x1="145" y1="358" x2="145" y2="378" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="50" y="378" width="190" height="50" fill="#D5F4E6" stroke="#1B7C42" stroke-width="1.5" rx="4"/>
  <text x="145" y="398" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B7C42">Replica 1</text>
  <text x="145" y="414" font-size="10" text-anchor="middle" fill="#555">Read only  ·  AZ us-east-1b</text>
  <line x1="145" y1="428" x2="145" y2="448" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="50" y="448" width="190" height="50" fill="#D5F4E6" stroke="#1B7C42" stroke-width="1.5" rx="4"/>
  <text x="145" y="468" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B7C42">Replica 2</text>
  <text x="145" y="484" font-size="10" text-anchor="middle" fill="#555">Read only  ·  AZ us-east-1c</text>

  <!-- Partition 2 -->
  <rect x="335" y="250" width="230" height="280" fill="#FFF8E7" stroke="#D45B07" stroke-width="2" rx="8"/>
  <text x="450" y="272" font-size="12" font-weight="bold" text-anchor="middle" fill="#D45B07">Partition 2</text>
  <text x="450" y="288" font-size="10" text-anchor="middle" fill="#888">Key hash range: 0x5556–0xAAAA</text>
  <rect x="355" y="298" width="190" height="60" fill="#527FFF" stroke="#2E5FAF" stroke-width="1.5" rx="4"/>
  <text x="450" y="320" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Primary Node</text>
  <text x="450" y="338" font-size="10" text-anchor="middle" fill="#dce8ff">Read + Write  ·  AZ us-east-1b</text>
  <line x1="450" y1="358" x2="450" y2="378" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="355" y="378" width="190" height="50" fill="#D5F4E6" stroke="#1B7C42" stroke-width="1.5" rx="4"/>
  <text x="450" y="398" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B7C42">Replica 1</text>
  <text x="450" y="414" font-size="10" text-anchor="middle" fill="#555">Read only  ·  AZ us-east-1c</text>
  <line x1="450" y1="428" x2="450" y2="448" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="355" y="448" width="190" height="50" fill="#D5F4E6" stroke="#1B7C42" stroke-width="1.5" rx="4"/>
  <text x="450" y="468" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B7C42">Replica 2</text>
  <text x="450" y="484" font-size="10" text-anchor="middle" fill="#555">Read only  ·  AZ us-east-1a</text>

  <!-- Partition N -->
  <rect x="640" y="250" width="230" height="280" fill="#FFF8E7" stroke="#D45B07" stroke-width="2" rx="8"/>
  <text x="755" y="272" font-size="12" font-weight="bold" text-anchor="middle" fill="#D45B07">Partition N</text>
  <text x="755" y="288" font-size="10" text-anchor="middle" fill="#888">Key hash range: 0xAAAB–0xFFFF</text>
  <rect x="660" y="298" width="190" height="60" fill="#527FFF" stroke="#2E5FAF" stroke-width="1.5" rx="4"/>
  <text x="755" y="320" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Primary Node</text>
  <text x="755" y="338" font-size="10" text-anchor="middle" fill="#dce8ff">Read + Write  ·  AZ us-east-1c</text>
  <line x1="755" y1="358" x2="755" y2="378" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="660" y="378" width="190" height="50" fill="#D5F4E6" stroke="#1B7C42" stroke-width="1.5" rx="4"/>
  <text x="755" y="398" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B7C42">Replica 1</text>
  <text x="755" y="414" font-size="10" text-anchor="middle" fill="#555">Read only  ·  AZ us-east-1a</text>
  <line x1="755" y1="428" x2="755" y2="448" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="660" y="448" width="190" height="50" fill="#D5F4E6" stroke="#1B7C42" stroke-width="1.5" rx="4"/>
  <text x="755" y="468" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B7C42">Replica 2</text>
  <text x="755" y="484" font-size="10" text-anchor="middle" fill="#555">Read only  ·  AZ us-east-1b</text>

  <!-- Dots between partitions -->
  <circle cx="285" cy="390" r="5" fill="#888"/>
  <circle cx="297" cy="390" r="5" fill="#888"/>
  <circle cx="309" cy="390" r="5" fill="#888"/>
  <circle cx="591" cy="390" r="5" fill="#888"/>
  <circle cx="603" cy="390" r="5" fill="#888"/>
  <circle cx="615" cy="390" r="5" fill="#888"/>

  <!-- Notes at bottom -->
  <rect x="50" y="545" width="800" height="58" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1" rx="5"/>
  <text x="450" y="562" font-size="10" font-weight="bold" text-anchor="middle" fill="#444">Key Properties</text>
  <text x="450" y="578" font-size="10" text-anchor="middle" fill="#555">Each partition holds up to 10 GB and 3,000 RCU / 1,000 WCU.  Table splits into new partitions automatically when limits are reached.</text>
  <text x="450" y="594" font-size="10" text-anchor="middle" fill="#555">Data is synchronously replicated across 3 AZs.  Strongly consistent reads go to the primary node; eventually consistent reads can use replicas.</text>
</svg>
