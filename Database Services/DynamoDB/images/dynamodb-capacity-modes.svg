<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="450" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#232F3E">DynamoDB Capacity Modes</text>

  <!-- Provisioned Mode -->
  <rect x="30" y="50" width="400" height="390" fill="#E8F4F8" stroke="#0073BB" stroke-width="2" rx="8"/>
  <text x="230" y="75" font-size="14" font-weight="bold" text-anchor="middle" fill="#0073BB">Provisioned Capacity Mode</text>

  <rect x="50" y="88" width="360" height="55" fill="#527FFF" stroke="#2E5FAF" stroke-width="1.5" rx="5"/>
  <text x="230" y="112" font-size="12" font-weight="bold" text-anchor="middle" fill="white">You set RCU and WCU per table</text>
  <text x="230" y="132" font-size="10" text-anchor="middle" fill="#dce8ff">e.g. 100 RCU + 50 WCU provisioned</text>

  <!-- Graph area -->
  <rect x="50" y="155" width="360" height="120" fill="white" stroke="#CCC" stroke-width="1" rx="3"/>
  <text x="230" y="175" font-size="10" font-weight="bold" text-anchor="middle" fill="#444">Traffic vs. Provisioned Capacity</text>
  <!-- X axis -->
  <line x1="70" y1="255" x2="395" y2="255" stroke="#999" stroke-width="1"/>
  <text x="230" y="268" font-size="9" text-anchor="middle" fill="#777">Time →</text>
  <!-- Y axis -->
  <line x1="70" y1="185" x2="70" y2="255" stroke="#999" stroke-width="1"/>
  <!-- Provisioned line -->
  <line x1="70" y1="215" x2="395" y2="215" stroke="#0073BB" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="400" y="218" font-size="9" fill="#0073BB">Provisioned</text>
  <!-- Traffic curve -->
  <polyline points="70,248 110,240 150,218 170,198 190,218 220,222 260,212 300,240 340,246 395,248" fill="none" stroke="#FF9900" stroke-width="2"/>
  <text x="320" y="245" font-size="9" fill="#FF9900">Traffic</text>
  <!-- Throttle area -->
  <rect x="150" y="185" x="150" y="215" width="40" height="30" fill="rgba(255,0,0,0.12)" stroke="red" stroke-width="1"/>
  <rect x="150" y="185" width="40" height="30" fill="rgba(255,0,0,0.12)" stroke="none"/>
  <polyline points="150,185 170,198 190,215" fill="rgba(255,0,0,0.12)" stroke="none"/>
  <text x="170" y="207" font-size="8" text-anchor="middle" fill="red">Throttled</text>

  <rect x="50" y="285" width="360" height="30" fill="#FFF4E6" stroke="#D45B07" stroke-width="1" rx="3"/>
  <text x="230" y="305" font-size="10" text-anchor="middle" fill="#D45B07">Exceeding provisioned capacity = ThrottlingException</text>

  <rect x="50" y="325" width="360" height="90" fill="#F9F9F9" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="70" y="343" font-size="10" font-weight="bold" fill="#333">When to use:</text>
  <text x="70" y="360" font-size="10" fill="#555">• Steady, predictable traffic (within ±30%)</text>
  <text x="70" y="375" font-size="10" fill="#555">• Cost is lower than On-Demand for sustained load</text>
  <text x="70" y="390" font-size="10" fill="#555">• Can use Auto Scaling to adjust capacity</text>
  <text x="70" y="405" font-size="10" fill="#555">• Reserved Capacity discounts available (1–3 yr)</text>

  <!-- On-Demand Mode -->
  <rect x="470" y="50" width="400" height="390" fill="#FFF4E6" stroke="#D45B07" stroke-width="2" rx="8"/>
  <text x="670" y="75" font-size="14" font-weight="bold" text-anchor="middle" fill="#D45B07">On-Demand Capacity Mode</text>

  <rect x="490" y="88" width="360" height="55" fill="#D45B07" stroke="#B04000" stroke-width="1.5" rx="5"/>
  <text x="670" y="112" font-size="12" font-weight="bold" text-anchor="middle" fill="white">No capacity planning — pay per request</text>
  <text x="670" y="132" font-size="10" text-anchor="middle" fill="#FFE0B2">$0.25 per million reads · $1.25 per million writes</text>

  <!-- Graph area -->
  <rect x="490" y="155" width="360" height="120" fill="white" stroke="#CCC" stroke-width="1" rx="3"/>
  <text x="670" y="175" font-size="10" font-weight="bold" text-anchor="middle" fill="#444">Traffic vs. Capacity (auto-adapts)</text>
  <line x1="510" y1="255" x2="835" y2="255" stroke="#999" stroke-width="1"/>
  <text x="670" y="268" font-size="9" text-anchor="middle" fill="#777">Time →</text>
  <line x1="510" y1="185" x2="510" y2="255" stroke="#999" stroke-width="1"/>
  <!-- Traffic curve (spiky) -->
  <polyline points="510,248 550,240 580,210 600,188 620,210 650,222 680,195 720,188 760,200 800,230 835,248" fill="none" stroke="#FF9900" stroke-width="2"/>
  <text x="760" y="200" font-size="9" fill="#FF9900">Traffic</text>
  <!-- Capacity follows -->
  <polyline points="510,245 550,238 580,208 600,186 620,208 650,220 680,193 720,186 760,198 800,228 835,246" fill="rgba(0,200,100,0.15)" stroke="#1B7C42" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="560" y="218" font-size="9" fill="#1B7C42">Capacity</text>
  <text x="530" y="236" font-size="8" fill="#1B7C42">(follows traffic)</text>

  <rect x="490" y="285" width="360" height="30" fill="#D5F4E6" stroke="#1B7C42" stroke-width="1" rx="3"/>
  <text x="670" y="305" font-size="10" text-anchor="middle" fill="#1B7C42">No throttling — DynamoDB scales automatically</text>

  <rect x="490" y="325" width="360" height="90" fill="#F9F9F9" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="510" y="343" font-size="10" font-weight="bold" fill="#333">When to use:</text>
  <text x="510" y="360" font-size="10" fill="#555">• Unpredictable or spiky traffic</text>
  <text x="510" y="375" font-size="10" fill="#555">• New tables without traffic data</text>
  <text x="510" y="390" font-size="10" fill="#555">• Dev/test tables with infrequent access</text>
  <text x="510" y="405" font-size="10" fill="#555">• Workloads with &lt;2x traffic peak-to-base ratio</text>

  <!-- Bottom note -->
  <rect x="30" y="450" width="840" height="22" fill="#F5F5F5" stroke="#CCC" stroke-width="1" rx="3"/>
  <text x="450" y="465" font-size="10" text-anchor="middle" fill="#444">Switching between modes: allowed once every 24 hours. Provisioned is ~6–7× cheaper per request than On-Demand at high sustained throughput.</text>
</svg>
