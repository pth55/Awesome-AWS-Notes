<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="900" height="560" fill="#F8F9FA"/>
  <text x="450" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#232F3E">RDS Standard vs Amazon Aurora — Head-to-Head</text>

  <!-- Header row -->
  <rect x="20" y="52" width="320" height="42" fill="#232F3E" rx="6"/>
  <text x="180" y="78" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Feature</text>
  <rect x="350" y="52" width="245" height="42" fill="#0073BB" rx="6"/>
  <text x="472" y="78" font-size="13" font-weight="bold" text-anchor="middle" fill="white">RDS (MySQL / PostgreSQL)</text>
  <rect x="605" y="52" width="275" height="42" fill="#8C4FFF" rx="6"/>
  <text x="742" y="78" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Amazon Aurora</text>

  <!-- Rows alternating -->
  <!-- Row 1 -->
  <rect x="20" y="98" width="855" height="36" fill="#F2F3F4" rx="0"/>
  <text x="180" y="121" font-size="12" text-anchor="middle" fill="#232F3E">Engine</text>
  <text x="472" y="121" font-size="11" text-anchor="middle" fill="#1A5276">MySQL / PostgreSQL (community)</text>
  <text x="742" y="121" font-size="11" text-anchor="middle" fill="#4A235A">AWS-proprietary (MySQL/PG compatible)</text>

  <!-- Row 2 -->
  <rect x="20" y="134" width="855" height="36" fill="white" rx="0"/>
  <text x="180" y="157" font-size="12" text-anchor="middle" fill="#232F3E">Performance</text>
  <text x="472" y="157" font-size="11" text-anchor="middle" fill="#1A5276">Standard</text>
  <text x="742" y="157" font-size="11" text-anchor="middle" fill="#6A3BBF">⚡ Up to 5× faster than MySQL, 3× PG</text>

  <!-- Row 3 -->
  <rect x="20" y="170" width="855" height="36" fill="#F2F3F4" rx="0"/>
  <text x="180" y="193" font-size="12" text-anchor="middle" fill="#232F3E">Storage</text>
  <text x="472" y="193" font-size="11" text-anchor="middle" fill="#1A5276">EBS per instance · max 64 TB</text>
  <text x="742" y="193" font-size="11" text-anchor="middle" fill="#6A3BBF">Shared cluster storage · max 128 TB · auto-grows</text>

  <!-- Row 4 -->
  <rect x="20" y="206" width="855" height="36" fill="white" rx="0"/>
  <text x="180" y="229" font-size="12" text-anchor="middle" fill="#232F3E">Storage copies</text>
  <text x="472" y="229" font-size="11" text-anchor="middle" fill="#1A5276">1 copy per instance</text>
  <text x="742" y="229" font-size="11" text-anchor="middle" fill="#6A3BBF">6 copies across 3 AZs (self-healing)</text>

  <!-- Row 5 -->
  <rect x="20" y="242" width="855" height="36" fill="#F2F3F4" rx="0"/>
  <text x="180" y="265" font-size="12" text-anchor="middle" fill="#232F3E">Read replicas</text>
  <text x="472" y="265" font-size="11" text-anchor="middle" fill="#1A5276">Up to 5</text>
  <text x="742" y="265" font-size="11" text-anchor="middle" fill="#6A3BBF">Up to 15 · milliseconds lag · share storage</text>

  <!-- Row 6 -->
  <rect x="20" y="278" width="855" height="36" fill="white" rx="0"/>
  <text x="180" y="301" font-size="12" text-anchor="middle" fill="#232F3E">Failover time</text>
  <text x="472" y="301" font-size="11" text-anchor="middle" fill="#1A5276">1–2 min (Multi-AZ)</text>
  <text x="742" y="301" font-size="11" text-anchor="middle" fill="#6A3BBF">&lt; 30 seconds (promotes reader)</text>

  <!-- Row 7 -->
  <rect x="20" y="314" width="855" height="36" fill="#F2F3F4" rx="0"/>
  <text x="180" y="337" font-size="12" text-anchor="middle" fill="#232F3E">Backup</text>
  <text x="472" y="337" font-size="11" text-anchor="middle" fill="#1A5276">Daily snapshot + transaction logs</text>
  <text x="742" y="337" font-size="11" text-anchor="middle" fill="#6A3BBF">Continuous to S3 · zero perf impact · Backtrack</text>

  <!-- Row 8 -->
  <rect x="20" y="350" width="855" height="36" fill="white" rx="0"/>
  <text x="180" y="373" font-size="12" text-anchor="middle" fill="#232F3E">Serverless</text>
  <text x="472" y="373" font-size="11" text-anchor="middle" fill="#1A5276">No</text>
  <text x="742" y="373" font-size="11" text-anchor="middle" fill="#6A3BBF">Yes — Aurora Serverless v2</text>

  <!-- Row 9 -->
  <rect x="20" y="386" width="855" height="36" fill="#F2F3F4" rx="0"/>
  <text x="180" y="409" font-size="12" text-anchor="middle" fill="#232F3E">Global database</text>
  <text x="472" y="409" font-size="11" text-anchor="middle" fill="#1A5276">Cross-region read replica only</text>
  <text x="742" y="409" font-size="11" text-anchor="middle" fill="#6A3BBF">Aurora Global: &lt;1s cross-region replication</text>

  <!-- Row 10 -->
  <rect x="20" y="422" width="855" height="36" fill="white" rx="0"/>
  <text x="180" y="445" font-size="12" text-anchor="middle" fill="#232F3E">Backtrack</text>
  <text x="472" y="445" font-size="11" text-anchor="middle" fill="#1A5276">No (restore from snapshot)</text>
  <text x="742" y="445" font-size="11" text-anchor="middle" fill="#6A3BBF">Yes — rewind DB without restore (up to 72 hrs)</text>

  <!-- Row 11 - Cost highlight -->
  <rect x="20" y="458" width="855" height="40" fill="#FFF9C4" rx="0"/>
  <text x="180" y="483" font-size="12" font-weight="bold" text-anchor="middle" fill="#232F3E">💰 Cost</text>
  <text x="472" y="483" font-size="11" text-anchor="middle" fill="#1A5276">Lower · Free tier eligible</text>
  <text x="742" y="483" font-size="11" text-anchor="middle" fill="#6A3BBF">~20% more per instance · No free tier</text>

  <!-- Decision guide -->
  <rect x="20" y="510" width="415" height="42" fill="#E8F4FD" stroke="#0073BB" stroke-width="1.5" rx="6"/>
  <text x="227" y="528" font-size="11" font-weight="bold" text-anchor="middle" fill="#1A5276">Choose RDS when:</text>
  <text x="227" y="545" font-size="10" text-anchor="middle" fill="#1A5276">Cost matters · &lt;5 replicas needed · Standard performance</text>

  <rect x="465" y="510" width="415" height="42" fill="#F4ECF7" stroke="#8C4FFF" stroke-width="1.5" rx="6"/>
  <text x="672" y="528" font-size="11" font-weight="bold" text-anchor="middle" fill="#4A235A">Choose Aurora when:</text>
  <text x="672" y="545" font-size="10" text-anchor="middle" fill="#4A235A">High traffic · &gt;5 replicas · Sub-30s failover · Serverless</text>
</svg>
