<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#232F3E">
    Multi-AZ Deployment Architecture
  </text>

  <!-- AWS Region Container -->
  <rect x="50" y="60" width="800" height="520" fill="#F0F0F0" stroke="#232F3E" stroke-width="2" rx="10"/>
  <text x="70" y="90" font-size="16" font-weight="bold" fill="#232F3E">AWS Region: us-east-1</text>

  <!-- Availability Zone A -->
  <rect x="80" y="110" width="350" height="420" fill="#E8F4F8" stroke="#0073BB" stroke-width="2" rx="8"/>
  <text x="100" y="140" font-size="14" font-weight="bold" fill="#0073BB">Availability Zone A (us-east-1a)</text>

  <!-- Primary Instance -->
  <rect x="120" y="170" width="270" height="200" fill="#527FFF" stroke="#2E5FAF" stroke-width="3" rx="5"/>
  <text x="180" y="200" font-size="16" font-weight="bold" fill="white">Primary Instance</text>
  <text x="140" y="230" font-size="12" fill="white">Status: Active</text>
  <text x="140" y="255" font-size="11" fill="white">✓ Handles all reads and writes</text>
  <text x="140" y="275" font-size="11" fill="white">✓ Accepts client connections</text>
  <text x="140" y="295" font-size="11" fill="white">✓ Replicates to standby</text>

  <!-- Storage -->
  <rect x="140" y="320" width="230" height="30" fill="#FF9900" stroke="#FF6600" stroke-width="2" rx="3"/>
  <text x="180" y="340" font-size="11" fill="white">Storage: EBS Volume (100 GB)</text>

  <!-- Availability Zone B -->
  <rect x="470" y="110" width="350" height="420" fill="#FFF4E6" stroke="#D45B07" stroke-width="2" rx="8"/>
  <text x="490" y="140" font-size="14" font-weight="bold" fill="#D45B07">Availability Zone B (us-east-1b)</text>

  <!-- Standby Instance -->
  <rect x="510" y="170" width="270" height="200" fill="#95A5FF" stroke="#5566CC" stroke-width="3" rx="5" stroke-dasharray="10,5"/>
  <text x="560" y="200" font-size="16" font-weight="bold" fill="white">Standby Instance</text>
  <text x="530" y="230" font-size="12" fill="white">Status: Synchronized</text>
  <text x="530" y="255" font-size="11" fill="white">✗ NOT accessible for reads</text>
  <text x="530" y="275" font-size="11" fill="white">✓ Receives all writes</text>
  <text x="530" y="295" font-size="11" fill="white">✓ Ready for failover</text>

  <!-- Storage -->
  <rect x="530" y="320" width="230" height="30" fill="#FF9900" stroke="#FF6600" stroke-width="2" rx="3"/>
  <text x="560" y="340" font-size="11" fill="white">Storage: EBS Volume (100 GB)</text>

  <!-- Synchronous Replication Arrow -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#E74C3C"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#27AE60"/>
    </marker>
  </defs>

  <line x1="390" y1="260" x2="510" y2="260" stroke="#E74C3C" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="410" y="250" font-size="12" font-weight="bold" fill="#E74C3C">Synchronous</text>
  <text x="410" y="280" font-size="11" fill="#E74C3C">Replication</text>
  <text x="410" y="295" font-size="10" fill="#E74C3C">(Zero RPO)</text>

  <!-- Client Application -->
  <rect x="320" y="420" width="240" height="80" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="5"/>
  <text x="360" y="450" font-size="14" font-weight="bold" fill="white">Client Application</text>
  <text x="340" y="475" font-size="11" fill="white">Endpoint: myapp-db.xxxxx</text>
  <text x="340" y="492" font-size="11" fill="white">              .us-east-1.rds.amazonaws.com</text>

  <!-- Connection to Primary -->
  <line x1="380" y1="420" x2="255" y2="370" stroke="#27AE60" stroke-width="3" marker-end="url(#arrow2)"/>
  <text x="290" y="390" font-size="11" fill="#27AE60" font-weight="bold">Active Connection</text>

  <!-- DNS Route 53 -->
  <ellipse cx="450" cy="580" rx="90" ry="30" fill="#8C4FFF" stroke="#6A3BBF" stroke-width="2"/>
  <text x="420" y="587" font-size="12" font-weight="bold" fill="white">Route 53 DNS</text>

  <line x1="440" y1="550" x2="440" y2="500" stroke="#8C4FFF" stroke-width="2"/>

  <!-- Failover Info Box -->
  <rect x="50" y="600" width="800" height="40" fill="#FFFBCC" stroke="#FFA000" stroke-width="2" rx="5"/>
  <text x="60" y="622" font-size="12" font-weight="bold" fill="#232F3E">⚡ Automatic Failover:</text>
  <text x="190" y="622" font-size="11" fill="#232F3E">If Primary fails → DNS points to Standby (1-2 minutes) → Standby becomes Primary → New Standby provisioned</text>

  <!-- Legend -->
  <g transform="translate(650, 430)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#232F3E">Benefits:</text>
    <text x="0" y="18" font-size="10" fill="#232F3E">✓ High Availability</text>
    <text x="0" y="33" font-size="10" fill="#232F3E">✓ Zero Data Loss</text>
    <text x="0" y="48" font-size="10" fill="#232F3E">✓ Auto Failover</text>
    <text x="0" y="63" font-size="10" fill="#232F3E">✓ Same Endpoint</text>
  </g>
</svg>