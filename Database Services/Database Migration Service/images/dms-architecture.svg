<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="480" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#232F3E">AWS Database Migration Service — Architecture</text>

  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#232F3E"/>
    </marker>
    <marker id="arr4g" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1B7C42"/>
    </marker>
  </defs>

  <!-- Source Databases (left) -->
  <rect x="20" y="55" width="190" height="420" fill="#FFF8E7" stroke="#D45B07" stroke-width="2" rx="8"/>
  <text x="115" y="78" font-size="12" font-weight="bold" text-anchor="middle" fill="#D45B07">Source Databases</text>
  <rect x="35" y="90" width="160" height="30" fill="#D45B07" stroke="#B04000" rx="3"/>
  <text x="115" y="110" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Oracle / SQL Server</text>
  <rect x="35" y="128" width="160" height="30" fill="#D45B07" stroke="#B04000" rx="3"/>
  <text x="115" y="148" font-size="10" font-weight="bold" text-anchor="middle" fill="white">MySQL / PostgreSQL</text>
  <rect x="35" y="166" width="160" height="30" fill="#D45B07" stroke="#B04000" rx="3"/>
  <text x="115" y="186" font-size="10" font-weight="bold" text-anchor="middle" fill="white">MongoDB / DocumentDB</text>
  <rect x="35" y="204" width="160" height="30" fill="#D45B07" stroke="#B04000" rx="3"/>
  <text x="115" y="224" font-size="10" font-weight="bold" text-anchor="middle" fill="white">MariaDB / Db2</text>
  <rect x="35" y="242" width="160" height="30" fill="#D45B07" stroke="#B04000" rx="3"/>
  <text x="115" y="262" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Amazon RDS (any engine)</text>
  <rect x="35" y="280" width="160" height="30" fill="#D45B07" stroke="#B04000" rx="3"/>
  <text x="115" y="300" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Amazon Aurora</text>
  <rect x="35" y="318" width="160" height="30" fill="#D45B07" stroke="#B04000" rx="3"/>
  <text x="115" y="338" font-size="10" font-weight="bold" text-anchor="middle" fill="white">S3 / DynamoDB</text>

  <rect x="35" y="362" width="160" height="40" fill="#FFF0D0" stroke="#D45B07" rx="3"/>
  <text x="115" y="380" font-size="9" text-anchor="middle" fill="#555">On-premises, EC2,</text>
  <text x="115" y="394" font-size="9" text-anchor="middle" fill="#555">or another AWS account</text>

  <!-- Arrows from source to DMS -->
  <line x1="210" y1="265" x2="285" y2="265" stroke="#D45B07" stroke-width="2" marker-end="url(#arr4)"/>
  <text x="245" y="258" font-size="9" fill="#D45B07">Reads CDC</text>

  <!-- DMS Replication Instance (center) -->
  <rect x="285" y="80" width="390" height="370" fill="#E8F4F8" stroke="#0073BB" stroke-width="2" rx="8"/>
  <text x="480" y="103" font-size="13" font-weight="bold" text-anchor="middle" fill="#0073BB">DMS Replication Instance</text>
  <text x="480" y="120" font-size="10" text-anchor="middle" fill="#555">Managed EC2 instance in your VPC</text>

  <!-- Replication instance box -->
  <rect x="305" y="130" width="350" height="80" fill="#527FFF" stroke="#2E5FAF" stroke-width="1.5" rx="5"/>
  <text x="480" y="153" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Replication Engine</text>
  <text x="480" y="170" font-size="9" text-anchor="middle" fill="#dce8ff">Reads from source  ·  Transforms data  ·  Writes to target</text>
  <text x="480" y="185" font-size="9" text-anchor="middle" fill="#dce8ff">dms.t3.medium / dms.c5.large / dms.r5.xlarge</text>

  <!-- Migration types -->
  <rect x="305" y="225" width="160" height="100" fill="#D5F4E6" stroke="#1B7C42" stroke-width="1.5" rx="5"/>
  <text x="385" y="244" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B7C42">Full Load</text>
  <text x="385" y="261" font-size="9" text-anchor="middle" fill="#555">Bulk copy all existing</text>
  <text x="385" y="274" font-size="9" text-anchor="middle" fill="#555">data to target</text>
  <text x="385" y="287" font-size="9" text-anchor="middle" fill="#555">Best for initial load</text>
  <text x="385" y="303" font-size="8" text-anchor="middle" fill="#888">One-time, no ongoing sync</text>

  <rect x="495" y="225" width="160" height="100" fill="#FFF4E6" stroke="#D45B07" stroke-width="1.5" rx="5"/>
  <text x="575" y="244" font-size="11" font-weight="bold" text-anchor="middle" fill="#D45B07">Full Load + CDC</text>
  <text x="575" y="261" font-size="9" text-anchor="middle" fill="#555">Full Load, then capture</text>
  <text x="575" y="274" font-size="9" text-anchor="middle" fill="#555">ongoing changes via CDC</text>
  <text x="575" y="287" font-size="9" text-anchor="middle" fill="#555">Best for live migrations</text>
  <text x="575" y="303" font-size="8" text-anchor="middle" fill="#888">Minimal downtime cutover</text>

  <rect x="305" y="340" width="350" height="40" fill="#F5F5F5" stroke="#CCC" rx="3"/>
  <text x="480" y="357" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">CDC only</text>
  <text x="480" y="371" font-size="9" text-anchor="middle" fill="#555">Ongoing replication only (target already has data) · Used for near-real-time sync</text>

  <rect x="305" y="390" width="350" height="48" fill="#F0F0FF" stroke="#6677CC" rx="3"/>
  <text x="480" y="407" font-size="10" font-weight="bold" text-anchor="middle" fill="#445">Schema Conversion Tool (SCT)</text>
  <text x="480" y="422" font-size="9" text-anchor="middle" fill="#555">Converts schema from source dialect (Oracle DDL) to target dialect (Aurora PostgreSQL)</text>
  <text x="480" y="435" font-size="9" text-anchor="middle" fill="#888">Run separately before DMS migration task · Free download</text>

  <!-- Arrows from DMS to target -->
  <line x1="675" y1="265" x2="750" y2="265" stroke="#1B7C42" stroke-width="2" marker-end="url(#arr4g)"/>
  <text x="708" y="258" font-size="9" fill="#1B7C42">Writes</text>

  <!-- Target Databases (right) -->
  <rect x="750" y="55" width="190" height="420" fill="#D5F4E6" stroke="#1B7C42" stroke-width="2" rx="8"/>
  <text x="845" y="78" font-size="12" font-weight="bold" text-anchor="middle" fill="#1B7C42">Target Databases</text>
  <rect x="765" y="90" width="160" height="30" fill="#1B7C42" stroke="#155A30" rx="3"/>
  <text x="845" y="110" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Amazon RDS</text>
  <rect x="765" y="128" width="160" height="30" fill="#1B7C42" stroke="#155A30" rx="3"/>
  <text x="845" y="148" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Amazon Aurora</text>
  <rect x="765" y="166" width="160" height="30" fill="#1B7C42" stroke="#155A30" rx="3"/>
  <text x="845" y="186" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Amazon DynamoDB</text>
  <rect x="765" y="204" width="160" height="30" fill="#1B7C42" stroke="#155A30" rx="3"/>
  <text x="845" y="224" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Amazon Redshift</text>
  <rect x="765" y="242" width="160" height="30" fill="#1B7C42" stroke="#155A30" rx="3"/>
  <text x="845" y="262" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Amazon DocumentDB</text>
  <rect x="765" y="280" width="160" height="30" fill="#1B7C42" stroke="#155A30" rx="3"/>
  <text x="845" y="300" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Amazon S3</text>
  <rect x="765" y="318" width="160" height="30" fill="#1B7C42" stroke="#155A30" rx="3"/>
  <text x="845" y="338" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Kafka / Kinesis</text>

  <rect x="765" y="362" width="160" height="40" fill="#C8EDD8" stroke="#1B7C42" rx="3"/>
  <text x="845" y="380" font-size="9" text-anchor="middle" fill="#1B7C42">Same or different AWS</text>
  <text x="845" y="394" font-size="9" text-anchor="middle" fill="#1B7C42">account or region</text>

  <!-- Bottom note -->
  <rect x="20" y="490" width="920" height="50" fill="#F5F5F5" stroke="#CCC" rx="5"/>
  <text x="480" y="509" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">DMS Pricing</text>
  <text x="480" y="526" font-size="9" text-anchor="middle" fill="#555">Replication instance: ~$0.074/hr (dms.t3.medium) · Free data transfer within same region between source and target</text>
  <text x="480" y="540" font-size="9" text-anchor="middle" fill="#555">Log storage (change data capture): $0.10/GB/month · No data transfer charges for migrating into AWS</text>
</svg>
