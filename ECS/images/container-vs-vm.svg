<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Title -->
  <text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#232F3E">
    Container vs Virtual Machine Architecture
  </text>

  <!-- Virtual Machines Side -->
  <text x="300" y="70" font-size="20" font-weight="bold" text-anchor="middle" fill="#FF9900">
    Virtual Machines
  </text>

  <!-- VM Infrastructure Stack -->
  <rect x="50" y="480" width="500" height="60" fill="#232F3E" stroke="#000" stroke-width="2"/>
  <text x="300" y="515" font-size="16" text-anchor="middle" fill="#FFF">Physical Hardware</text>

  <rect x="50" y="420" width="500" height="60" fill="#3F51B5" stroke="#000" stroke-width="2"/>
  <text x="300" y="455" font-size="16" text-anchor="middle" fill="#FFF">Host Operating System</text>

  <rect x="50" y="360" width="500" height="60" fill="#9C27B0" stroke="#000" stroke-width="2"/>
  <text x="300" y="395" font-size="16" text-anchor="middle" fill="#FFF">Hypervisor (ESXi, KVM)</text>

  <!-- VM1 -->
  <rect x="70" y="100" width="140" height="240" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
  <text x="140" y="125" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">VM 1</text>

  <rect x="80" y="140" width="120" height="40" fill="#FF9800" stroke="#000" stroke-width="1"/>
  <text x="140" y="165" font-size="12" text-anchor="middle">App A</text>

  <rect x="80" y="190" width="120" height="40" fill="#FFC107" stroke="#000" stroke-width="1"/>
  <text x="140" y="215" font-size="12" text-anchor="middle">Bins/Libs</text>

  <rect x="80" y="240" width="120" height="80" fill="#4CAF50" stroke="#000" stroke-width="1"/>
  <text x="140" y="280" font-size="12" text-anchor="middle" fill="#FFF">Guest OS</text>
  <text x="140" y="295" font-size="10" text-anchor="middle" fill="#FFF">(Full Linux)</text>
  <text x="140" y="310" font-size="10" text-anchor="middle" fill="#FFF">~2 GB</text>

  <!-- VM2 -->
  <rect x="230" y="100" width="140" height="240" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
  <text x="300" y="125" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">VM 2</text>

  <rect x="240" y="140" width="120" height="40" fill="#FF9800" stroke="#000" stroke-width="1"/>
  <text x="300" y="165" font-size="12" text-anchor="middle">App B</text>

  <rect x="240" y="190" width="120" height="40" fill="#FFC107" stroke="#000" stroke-width="1"/>
  <text x="300" y="215" font-size="12" text-anchor="middle">Bins/Libs</text>

  <rect x="240" y="240" width="120" height="80" fill="#4CAF50" stroke="#000" stroke-width="1"/>
  <text x="300" y="280" font-size="12" text-anchor="middle" fill="#FFF">Guest OS</text>
  <text x="300" y="295" font-size="10" text-anchor="middle" fill="#FFF">(Full Linux)</text>
  <text x="300" y="310" font-size="10" text-anchor="middle" fill="#FFF">~2 GB</text>

  <!-- VM3 -->
  <rect x="390" y="100" width="140" height="240" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
  <text x="460" y="125" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">VM 3</text>

  <rect x="400" y="140" width="120" height="40" fill="#FF9800" stroke="#000" stroke-width="1"/>
  <text x="460" y="165" font-size="12" text-anchor="middle">App C</text>

  <rect x="400" y="190" width="120" height="40" fill="#FFC107" stroke="#000" stroke-width="1"/>
  <text x="460" y="215" font-size="12" text-anchor="middle">Bins/Libs</text>

  <rect x="400" y="240" width="120" height="80" fill="#4CAF50" stroke="#000" stroke-width="1"/>
  <text x="460" y="280" font-size="12" text-anchor="middle" fill="#FFF">Guest OS</text>
  <text x="460" y="295" font-size="10" text-anchor="middle" fill="#FFF">(Windows)</text>
  <text x="460" y="310" font-size="10" text-anchor="middle" fill="#FFF">~4 GB</text>

  <!-- Containers Side -->
  <text x="900" y="70" font-size="20" font-weight="bold" text-anchor="middle" fill="#FF9900">
    Containers
  </text>

  <!-- Container Infrastructure Stack -->
  <rect x="650" y="480" width="500" height="60" fill="#232F3E" stroke="#000" stroke-width="2"/>
  <text x="900" y="515" font-size="16" text-anchor="middle" fill="#FFF">Physical Hardware</text>

  <rect x="650" y="420" width="500" height="60" fill="#3F51B5" stroke="#000" stroke-width="2"/>
  <text x="900" y="455" font-size="16" text-anchor="middle" fill="#FFF">Host OS (Single Shared Kernel)</text>

  <rect x="650" y="360" width="500" height="60" fill="#00BCD4" stroke="#000" stroke-width="2"/>
  <text x="900" y="395" font-size="16" text-anchor="middle" fill="#FFF">Container Runtime (Docker)</text>

  <!-- Container 1 -->
  <rect x="670" y="100" width="100" height="240" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
  <text x="720" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#4CAF50">Container 1</text>

  <rect x="680" y="140" width="80" height="50" fill="#FF9800" stroke="#000" stroke-width="1"/>
  <text x="720" y="170" font-size="11" text-anchor="middle">App A</text>

  <rect x="680" y="200" width="80" height="120" fill="#FFC107" stroke="#000" stroke-width="1"/>
  <text x="720" y="220" font-size="10" text-anchor="middle">Bins/</text>
  <text x="720" y="235" font-size="10" text-anchor="middle">Libs</text>
  <text x="720" y="260" font-size="9" text-anchor="middle">~50 MB</text>

  <!-- Container 2 -->
  <rect x="790" y="100" width="100" height="240" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
  <text x="840" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#4CAF50">Container 2</text>

  <rect x="800" y="140" width="80" height="50" fill="#FF9800" stroke="#000" stroke-width="1"/>
  <text x="840" y="170" font-size="11" text-anchor="middle">App B</text>

  <rect x="800" y="200" width="80" height="120" fill="#FFC107" stroke="#000" stroke-width="1"/>
  <text x="840" y="220" font-size="10" text-anchor="middle">Bins/</text>
  <text x="840" y="235" font-size="10" text-anchor="middle">Libs</text>
  <text x="840" y="260" font-size="9" text-anchor="middle">~30 MB</text>

  <!-- Container 3 -->
  <rect x="910" y="100" width="100" height="240" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
  <text x="960" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#4CAF50">Container 3</text>

  <rect x="920" y="140" width="80" height="50" fill="#FF9800" stroke="#000" stroke-width="1"/>
  <text x="960" y="170" font-size="11" text-anchor="middle">App C</text>

  <rect x="920" y="200" width="80" height="120" fill="#FFC107" stroke="#000" stroke-width="1"/>
  <text x="960" y="220" font-size="10" text-anchor="middle">Bins/</text>
  <text x="960" y="235" font-size="10" text-anchor="middle">Libs</text>
  <text x="960" y="260" font-size="9" text-anchor="middle">~40 MB</text>

  <!-- Container 4 -->
  <rect x="1030" y="100" width="100" height="240" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
  <text x="1080" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#4CAF50">Container 4</text>

  <rect x="1040" y="140" width="80" height="50" fill="#FF9800" stroke="#000" stroke-width="1"/>
  <text x="1080" y="170" font-size="11" text-anchor="middle">App D</text>

  <rect x="1040" y="200" width="80" height="120" fill="#FFC107" stroke="#000" stroke-width="1"/>
  <text x="1080" y="220" font-size="10" text-anchor="middle">Bins/</text>
  <text x="1080" y="235" font-size="10" text-anchor="middle">Libs</text>
  <text x="1080" y="260" font-size="9" text-anchor="middle">~25 MB</text>

  <!-- Comparison Labels -->
  <text x="300" y="570" font-size="13" text-anchor="middle" fill="#E53935" font-weight="bold">
    3 VMs = ~8 GB total
  </text>
  <text x="900" y="570" font-size="13" text-anchor="middle" fill="#2E7D32" font-weight="bold">
    4 Containers = ~145 MB total
  </text>
</svg>