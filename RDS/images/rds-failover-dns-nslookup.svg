<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1000" height="620" fill="#F8F9FA"/>
  <text x="500" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#232F3E">Multi-AZ Failover: DNS Behavior (nslookup Proof)</text>

  <!-- ══════════ LEFT PANEL: BEFORE FAILOVER ══════════ -->
  <rect x="20" y="55" width="460" height="520" fill="#EAF4FF" stroke="#0073BB" stroke-width="2" rx="10"/>
  <rect x="20" y="55" width="460" height="40" fill="#0073BB" rx="10"/>
  <rect x="20" y="82" width="460" height="13" fill="#0073BB"/>
  <text x="250" y="82" font-size="15" font-weight="bold" text-anchor="middle" fill="white">BEFORE FAILOVER — Normal Operation</text>

  <!-- AZ-A Primary -->
  <rect x="50" y="115" width="180" height="130" fill="#1A5276" stroke="#0E3460" stroke-width="2" rx="6"/>
  <text x="140" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Primary</text>
  <text x="140" y="160" font-size="11" text-anchor="middle" fill="#AED6F1">AZ-A  |  ACTIVE</text>
  <text x="60" y="182" font-size="10" fill="white">IP: 10.0.1.50</text>
  <text x="60" y="200" font-size="10" fill="white">Port: 3306 OPEN</text>
  <text x="60" y="218" font-size="10" fill="#85C1E9">✓ Accepting connections</text>

  <!-- AZ-B Standby -->
  <rect x="260" y="115" width="180" height="130" fill="#7D6608" stroke="#5D4E07" stroke-width="2" rx="6" stroke-dasharray="8,4"/>
  <text x="350" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Standby</text>
  <text x="350" y="160" font-size="11" text-anchor="middle" fill="#F9E79F">AZ-B  |  PASSIVE</text>
  <text x="270" y="182" font-size="10" fill="white">IP: 10.0.2.75</text>
  <text x="270" y="200" font-size="10" fill="white">Port: 3306 SILENT</text>
  <text x="270" y="218" font-size="10" fill="#F9E79F">✗ Not accepting connections</text>

  <!-- DNS Box -->
  <rect x="100" y="270" width="260" height="60" fill="#8C4FFF" stroke="#6A3BBF" stroke-width="2" rx="6"/>
  <text x="230" y="293" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Route 53 DNS Record</text>
  <text x="230" y="315" font-size="11" text-anchor="middle" fill="#E8DAFF">mydb.xxxxx.rds.amazonaws.com</text>

  <!-- Arrow DNS → Primary -->
  <line x1="180" y1="270" x2="175" y2="245" stroke="#8C4FFF" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="90" y="263" font-size="10" fill="#6A3BBF">→ resolves to 10.0.1.50</text>

  <!-- nslookup output BEFORE -->
  <rect x="40" y="352" width="420" height="100" fill="#1E1E1E" stroke="#555" stroke-width="1.5" rx="5"/>
  <text x="60" y="375" font-size="11" fill="#A8D8A8" font-family="monospace">$ nslookup mydb.xxxxx.rds.amazonaws.com</text>
  <text x="60" y="394" font-size="11" fill="#CCCCCC" font-family="monospace">Server:     10.0.0.2</text>
  <text x="60" y="413" font-size="11" fill="#CCCCCC" font-family="monospace">Name:   mydb.xxxxx.rds.amazonaws.com</text>
  <text x="60" y="432" font-size="11" fill="#FFD700" font-family="monospace">Address: 10.0.1.50   ← Primary IP</text>

  <!-- App connecting label -->
  <rect x="50" y="470" width="380" height="50" fill="#D6EAF8" stroke="#0073BB" stroke-width="1" rx="5"/>
  <text x="240" y="491" font-size="11" text-anchor="middle" fill="#1A5276">Application → endpoint → DNS → 10.0.1.50</text>
  <text x="240" y="511" font-size="12" font-weight="bold" text-anchor="middle" fill="#1A5276">Connection: ✓ PRIMARY ACTIVE</text>

  <!-- ══════════ RIGHT PANEL: AFTER FAILOVER ══════════ -->
  <rect x="520" y="55" width="460" height="520" fill="#EAFAF1" stroke="#27AE60" stroke-width="2" rx="10"/>
  <rect x="520" y="55" width="460" height="40" fill="#E74C3C" rx="10"/>
  <rect x="520" y="82" width="460" height="13" fill="#E74C3C"/>
  <text x="750" y="82" font-size="15" font-weight="bold" text-anchor="middle" fill="white">AFTER FAILOVER — Standby Promoted</text>

  <!-- AZ-A failed -->
  <rect x="550" y="115" width="180" height="130" fill="#555555" stroke="#333" stroke-width="2" rx="6" stroke-dasharray="6,4"/>
  <text x="640" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="#AAAAAA">OLD Primary</text>
  <text x="640" y="160" font-size="11" text-anchor="middle" fill="#888888">AZ-A  |  ✗ FAILED</text>
  <text x="560" y="182" font-size="10" fill="#888888">IP: 10.0.1.50</text>
  <text x="560" y="200" font-size="10" fill="#888888">Port: 3306 DOWN</text>
  <text x="560" y="218" font-size="10" fill="#FF6B6B">✗ No longer reachable</text>

  <!-- AZ-B now Primary -->
  <rect x="760" y="115" width="180" height="130" fill="#1E8449" stroke="#196F3D" stroke-width="2" rx="6"/>
  <text x="850" y="140" font-size="13" font-weight="bold" text-anchor="middle" fill="white">NEW Primary</text>
  <text x="850" y="160" font-size="11" text-anchor="middle" fill="#ABEBC6">AZ-B  |  PROMOTED ✓</text>
  <text x="770" y="182" font-size="10" fill="white">IP: 10.0.2.75</text>
  <text x="770" y="200" font-size="10" fill="white">Port: 3306 OPEN</text>
  <text x="770" y="218" font-size="10" fill="#ABEBC6">✓ Now accepting connections</text>

  <!-- DNS Box updated -->
  <rect x="600" y="270" width="260" height="60" fill="#E74C3C" stroke="#C0392B" stroke-width="2" rx="6"/>
  <text x="730" y="293" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Route 53 DNS — UPDATED!</text>
  <text x="730" y="315" font-size="11" text-anchor="middle" fill="#FDEDEC">mydb.xxxxx.rds.amazonaws.com</text>

  <!-- Arrow DNS → New Primary -->
  <line x1="840" y1="270" x2="848" y2="245" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="830" y="263" font-size="10" fill="#C0392B">→ now resolves to 10.0.2.75</text>

  <!-- nslookup output AFTER -->
  <rect x="540" y="352" width="420" height="100" fill="#1E1E1E" stroke="#555" stroke-width="1.5" rx="5"/>
  <text x="560" y="375" font-size="11" fill="#A8D8A8" font-family="monospace">$ nslookup mydb.xxxxx.rds.amazonaws.com</text>
  <text x="560" y="394" font-size="11" fill="#CCCCCC" font-family="monospace">Server:     10.0.0.2</text>
  <text x="560" y="413" font-size="11" fill="#CCCCCC" font-family="monospace">Name:   mydb.xxxxx.rds.amazonaws.com</text>
  <text x="560" y="432" font-size="11" fill="#FFD700" font-family="monospace">Address: 10.0.2.75   ← Standby (now Primary) IP</text>

  <!-- App connecting label -->
  <rect x="550" y="470" width="380" height="50" fill="#D5F5E3" stroke="#27AE60" stroke-width="1" rx="5"/>
  <text x="740" y="491" font-size="11" text-anchor="middle" fill="#1E8449">Application → endpoint → DNS → 10.0.2.75</text>
  <text x="740" y="511" font-size="12" font-weight="bold" text-anchor="middle" fill="#1E8449">Connection: ✓ NEW PRIMARY ACTIVE</text>

  <!-- Bottom insight -->
  <rect x="20" y="590" width="960" height="26" fill="#232F3E" rx="4"/>
  <text x="500" y="607" font-size="11" text-anchor="middle" fill="white">
    DNS NAME never changes. Only the IP behind it changes. App code stays the same. App must retry connection after ~1-2 min downtime.
  </text>
</svg>
