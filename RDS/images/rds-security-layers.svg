<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#232F3E">
    RDS Security Layers
  </text>

  <!-- Layer 1: Network Security -->
  <rect x="50" y="60" width="700" height="140" fill="#E8F4F8" stroke="#0073BB" stroke-width="3" rx="8"/>
  <text x="70" y="90" font-size="16" font-weight="bold" fill="#0073BB">🔒 Layer 1: Network Security</text>

  <rect x="80" y="110" width="180" height="70" fill="white" stroke="#0073BB" stroke-width="2" rx="5"/>
  <text x="100" y="135" font-size="12" font-weight="bold" fill="#232F3E">VPC Isolation</text>
  <text x="100" y="155" font-size="10" fill="#232F3E">✓ Private subnets</text>
  <text x="100" y="170" font-size="10" fill="#232F3E">✓ No public access</text>

  <rect x="280" y="110" width="180" height="70" fill="white" stroke="#0073BB" stroke-width="2" rx="5"/>
  <text x="300" y="135" font-size="12" font-weight="bold" fill="#232F3E">Security Groups</text>
  <text x="300" y="155" font-size="10" fill="#232F3E">✓ Port 3306 only</text>
  <text x="300" y="170" font-size="10" fill="#232F3E">✓ Source: App SG</text>

  <rect x="480" y="110" width="180" height="70" fill="white" stroke="#0073BB" stroke-width="2" rx="5"/>
  <text x="500" y="135" font-size="12" font-weight="bold" fill="#232F3E">NACLs</text>
  <text x="500" y="155" font-size="10" fill="#232F3E">✓ Subnet-level</text>
  <text x="500" y="170" font-size="10" fill="#232F3E">✓ Stateless firewall</text>

  <!-- Layer 2: Authentication -->
  <rect x="50" y="220" width="700" height="140" fill="#FFF4E6" stroke="#D45B07" stroke-width="3" rx="8"/>
  <text x="70" y="250" font-size="16" font-weight="bold" fill="#D45B07">🔑 Layer 2: Authentication</text>

  <rect x="80" y="270" width="180" height="70" fill="white" stroke="#D45B07" stroke-width="2" rx="5"/>
  <text x="100" y="295" font-size="12" font-weight="bold" fill="#232F3E">Password Auth</text>
  <text x="100" y="315" font-size="10" fill="#232F3E">Master username</text>
  <text x="100" y="330" font-size="10" fill="#232F3E">+ password</text>

  <rect x="280" y="270" width="180" height="70" fill="white" stroke="#D45B07" stroke-width="2" rx="5"/>
  <text x="300" y="295" font-size="12" font-weight="bold" fill="#232F3E">IAM Auth</text>
  <text x="300" y="315" font-size="10" fill="#232F3E">Temporary tokens</text>
  <text x="300" y="330" font-size="10" fill="#232F3E">No passwords</text>

  <rect x="480" y="270" width="180" height="70" fill="white" stroke="#D45B07" stroke-width="2" rx="5"/>
  <text x="500" y="295" font-size="12" font-weight="bold" fill="#232F3E">Secrets Manager</text>
  <text x="500" y="315" font-size="10" fill="#232F3E">Encrypted storage</text>
  <text x="500" y="330" font-size="10" fill="#232F3E">Auto rotation</text>

  <!-- Layer 3: Encryption -->
  <rect x="50" y="380" width="700" height="160" fill="#E1F5E1" stroke="#2E7D32" stroke-width="3" rx="8"/>
  <text x="70" y="410" font-size="16" font-weight="bold" fill="#2E7D32">🔐 Layer 3: Encryption</text>

  <rect x="80" y="430" width="200" height="90" fill="white" stroke="#2E7D32" stroke-width="2" rx="5"/>
  <text x="100" y="455" font-size="12" font-weight="bold" fill="#232F3E">At Rest</text>
  <text x="100" y="475" font-size="10" fill="#232F3E">✓ Storage (EBS)</text>
  <text x="100" y="490" font-size="10" fill="#232F3E">✓ Snapshots</text>
  <text x="100" y="505" font-size="10" fill="#232F3E">✓ AWS KMS encryption</text>

  <rect x="300" y="430" width="200" height="90" fill="white" stroke="#2E7D32" stroke-width="2" rx="5"/>
  <text x="320" y="455" font-size="12" font-weight="bold" fill="#232F3E">In Transit</text>
  <text x="320" y="475" font-size="10" fill="#232F3E">✓ SSL/TLS required</text>
  <text x="320" y="490" font-size="10" fill="#232F3E">✓ Force encryption</text>
  <text x="320" y="505" font-size="10" fill="#232F3E">✓ Certificate validation</text>

  <rect x="520" y="430" width="210" height="90" fill="#FFFBCC" stroke="#FFA000" stroke-width="2" rx="5"/>
  <text x="540" y="455" font-size="11" font-weight="bold" fill="#232F3E">⚠ Important:</text>
  <text x="540" y="475" font-size="10" fill="#232F3E">Cannot disable after</text>
  <text x="540" y="490" font-size="10" fill="#232F3E">instance creation</text>
  <text x="540" y="505" font-size="10" fill="#232F3E">Must recreate instance</text>

  <!-- Layer 4: Access Control -->
  <rect x="50" y="560" width="700" height="140" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="3" rx="8"/>
  <text x="70" y="590" font-size="16" font-weight="bold" fill="#7B1FA2">👥 Layer 4: Access Control</text>

  <rect x="80" y="610" width="180" height="70" fill="white" stroke="#7B1FA2" stroke-width="2" rx="5"/>
  <text x="100" y="635" font-size="12" font-weight="bold" fill="#232F3E">Database Users</text>
  <text x="100" y="655" font-size="10" fill="#232F3E">GRANT/REVOKE</text>
  <text x="100" y="670" font-size="10" fill="#232F3E">Least privilege</text>

  <rect x="280" y="610" width="180" height="70" fill="white" stroke="#7B1FA2" stroke-width="2" rx="5"/>
  <text x="300" y="635" font-size="12" font-weight="bold" fill="#232F3E">IAM Policies</text>
  <text x="300" y="655" font-size="10" fill="#232F3E">Who manages RDS</text>
  <text x="300" y="670" font-size="10" fill="#232F3E">AWS API access</text>

  <rect x="480" y="610" width="180" height="70" fill="white" stroke="#7B1FA2" stroke-width="2" rx="5"/>
  <text x="500" y="635" font-size="12" font-weight="bold" fill="#232F3E">Resource Tags</text>
  <text x="500" y="655" font-size="10" fill="#232F3E">Environment tags</text>
  <text x="500" y="670" font-size="10" fill="#232F3E">Cost allocation</text>

  <!-- Layer 5: Auditing & Monitoring -->
  <rect x="50" y="720" width="700" height="160" fill="#FCE4EC" stroke="#C2185B" stroke-width="3" rx="8"/>
  <text x="70" y="750" font-size="16" font-weight="bold" fill="#C2185B">📊 Layer 5: Auditing & Monitoring</text>

  <rect x="80" y="770" width="150" height="90" fill="white" stroke="#C2185B" stroke-width="2" rx="5"/>
  <text x="100" y="795" font-size="12" font-weight="bold" fill="#232F3E">CloudTrail</text>
  <text x="100" y="815" font-size="10" fill="#232F3E">AWS API logs</text>
  <text x="100" y="830" font-size="10" fill="#232F3E">Who did what</text>
  <text x="100" y="845" font-size="10" fill="#232F3E">When and where</text>

  <rect x="250" y="770" width="150" height="90" fill="white" stroke="#C2185B" stroke-width="2" rx="5"/>
  <text x="270" y="795" font-size="12" font-weight="bold" fill="#232F3E">Database Logs</text>
  <text x="270" y="815" font-size="10" fill="#232F3E">Error log</text>
  <text x="270" y="830" font-size="10" fill="#232F3E">Slow query log</text>
  <text x="270" y="845" font-size="10" fill="#232F3E">General log</text>

  <rect x="420" y="770" width="150" height="90" fill="white" stroke="#C2185B" stroke-width="2" rx="5"/>
  <text x="440" y="795" font-size="12" font-weight="bold" fill="#232F3E">Activity Stream</text>
  <text x="440" y="815" font-size="10" fill="#232F3E">Real-time audit</text>
  <text x="440" y="830" font-size="10" fill="#232F3E">Tamper-proof</text>
  <text x="440" y="845" font-size="10" fill="#232F3E">Compliance</text>

  <rect x="590" y="770" width="140" height="90" fill="white" stroke="#C2185B" stroke-width="2" rx="5"/>
  <text x="610" y="795" font-size="12" font-weight="bold" fill="#232F3E">CloudWatch</text>
  <text x="610" y="815" font-size="10" fill="#232F3E">Metrics</text>
  <text x="610" y="830" font-size="10" fill="#232F3E">Alarms</text>
  <text x="610" y="845" font-size="10" fill="#232F3E">Dashboards</text>

  <!-- Defense in Depth -->
  <rect x="200" y="895" width="400" height="30" fill="#FFE0E0" stroke="#D32F2F" stroke-width="2" rx="5"/>
  <text x="280" y="915" font-size="12" font-weight="bold" fill="#D32F2F">🛡️ Defense in Depth Strategy</text>
</svg>