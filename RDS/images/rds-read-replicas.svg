<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#232F3E">
    Read Replicas Architecture
  </text>

  <!-- AWS Region Container -->
  <rect x="50" y="60" width="800" height="580" fill="#F0F0F0" stroke="#232F3E" stroke-width="2" rx="10"/>
  <text x="70" y="90" font-size="16" font-weight="bold" fill="#232F3E">AWS Region: us-east-1</text>

  <!-- Primary Database -->
  <rect x="350" y="130" width="200" height="140" fill="#527FFF" stroke="#2E5FAF" stroke-width="3" rx="5"/>
  <text x="400" y="160" font-size="16" font-weight="bold" fill="white">Primary Database</text>
  <text x="370" y="190" font-size="12" fill="white">Read + Write</text>
  <text x="370" y="210" font-size="11" fill="white">✓ All writes go here</text>
  <text x="370" y="230" font-size="11" fill="white">✓ Critical reads</text>
  <text x="370" y="250" font-size="11" fill="white">Endpoint: myapp-db...</text>

  <!-- Read Replica 1 -->
  <rect x="100" y="380" width="180" height="120" fill="#95A5FF" stroke="#5566CC" stroke-width="2" rx="5"/>
  <text x="130" y="410" font-size="14" font-weight="bold" fill="white">Read Replica 1</text>
  <text x="120" y="435" font-size="11" fill="white">Read-Only</text>
  <text x="120" y="455" font-size="10" fill="white">Use: Analytics queries</text>
  <text x="120" y="475" font-size="10" fill="white">Lag: < 1 second</text>
  <text x="120" y="490" font-size="9" fill="white">AZ: us-east-1a</text>

  <!-- Read Replica 2 -->
  <rect x="360" y="380" width="180" height="120" fill="#95A5FF" stroke="#5566CC" stroke-width="2" rx="5"/>
  <text x="390" y="410" font-size="14" font-weight="bold" fill="white">Read Replica 2</text>
  <text x="380" y="435" font-size="11" fill="white">Read-Only</text>
  <text x="380" y="455" font-size="10" fill="white">Use: Reporting</text>
  <text x="380" y="475" font-size="10" fill="white">Lag: < 1 second</text>
  <text x="380" y="490" font-size="9" fill="white">AZ: us-east-1b</text>

  <!-- Read Replica 3 (Cross-Region) -->
  <rect x="620" y="380" width="180" height="120" fill="#FFA500" stroke="#FF8C00" stroke-width="2" rx="5"/>
  <text x="640" y="410" font-size="14" font-weight="bold" fill="white">Read Replica 3</text>
  <text x="640" y="435" font-size="11" fill="white">Cross-Region</text>
  <text x="640" y="455" font-size="10" fill="white">Use: Disaster Recovery</text>
  <text x="640" y="475" font-size="10" fill="white">Lag: ~100-500ms</text>
  <text x="640" y="490" font-size="9" fill="white">Region: us-west-2</text>

  <!-- Async Replication Arrows -->
  <defs>
    <marker id="asyncarrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#E74C3C"/>
    </marker>
  </defs>

  <line x1="420" y1="270" x2="190" y2="380" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#asyncarrow)"/>
  <text x="260" y="320" font-size="10" fill="#E74C3C" font-weight="bold">Async</text>

  <line x1="450" y1="270" x2="450" y2="380" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#asyncarrow)"/>
  <text x="460" y="330" font-size="10" fill="#E74C3C" font-weight="bold">Async</text>

  <line x1="520" y1="270" x2="710" y2="380" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#asyncarrow)"/>
  <text x="600" y="320" font-size="10" fill="#E74C3C" font-weight="bold">Async</text>

  <!-- Application Tier -->
  <rect x="100" y="550" width="700" height="60" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="5"/>
  <text x="350" y="575" font-size="14" font-weight="bold" fill="white">Application Layer</text>
  <text x="120" y="595" font-size="11" fill="white">• Writes → Primary</text>
  <text x="280" y="595" font-size="11" fill="white">• Read-heavy queries → Replicas</text>
  <text x="520" y="595" font-size="11" fill="white">• Load balanced across replicas</text>

  <!-- Connection lines from app to databases -->
  <line x1="250" y1="550" x2="450" y2="270" stroke="#27AE60" stroke-width="2"/>
  <text x="320" y="410" font-size="10" fill="#27AE60">Writes</text>

  <line x1="400" y1="550" x2="190" y2="500" stroke="#3498DB" stroke-width="2"/>
  <line x1="450" y1="550" x2="450" y2="500" stroke="#3498DB" stroke-width="2"/>
  <line x1="550" y1="550" x2="710" y2="500" stroke="#3498DB" stroke-width="2"/>
  <text x="520" y="530" font-size="10" fill="#3498DB">Reads</text>

  <!-- Info boxes -->
  <rect x="60" y="650" width="380" height="40" fill="#E8F4F8" stroke="#0073BB" stroke-width="2" rx="5"/>
  <text x="70" y="672" font-size="11" font-weight="bold" fill="#232F3E">✓ Asynchronous replication (slight lag)</text>
  <text x="70" y="687" font-size="10" fill="#232F3E">✓ Up to 5 replicas (15 for Aurora)</text>

  <rect x="460" y="650" width="380" height="40" fill="#FFFBCC" stroke="#FFA000" stroke-width="2" rx="5"/>
  <text x="470" y="672" font-size="11" font-weight="bold" fill="#232F3E">⚠ No automatic failover</text>
  <text x="470" y="687" font-size="10" fill="#232F3E">⚠ Must manually promote replica if primary fails</text>

  <!-- Use Cases -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#232F3E">Use Cases:</text>
    <text x="0" y="18" font-size="10" fill="#232F3E">📊 Offload reporting</text>
    <text x="0" y="33" font-size="10" fill="#232F3E">📈 Analytics workloads</text>
    <text x="0" y="48" font-size="10" fill="#232F3E">🌍 Low-latency reads (geo)</text>
    <text x="0" y="63" font-size="10" fill="#232F3E">💾 Disaster recovery</text>
  </g>
</svg>