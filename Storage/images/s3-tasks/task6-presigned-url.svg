<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="900" height="400" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="14" fill="#1a237e" font-weight="bold">Task 6: Presigned URLs — Temporary Secure Object Access</text>

  <!-- Step labels -->
  <text x="120" y="66" text-anchor="middle" font-size="10" fill="#424242" font-weight="bold">① Owner generates URL</text>
  <text x="450" y="66" text-anchor="middle" font-size="10" fill="#424242" font-weight="bold">② URL shared with external user</text>
  <text x="770" y="66" text-anchor="middle" font-size="10" fill="#424242" font-weight="bold">③ External user accesses object</text>

  <!-- Divider lines -->
  <line x1="290" y1="50" x2="290" y2="380" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="610" y1="50" x2="610" y2="380" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── STEP 1: Owner generates ── -->
  <!-- Owner person -->
  <circle cx="60" cy="130" r="20" fill="none" stroke="#424242" stroke-width="2"/>
  <circle cx="60" cy="118" r="7" fill="none" stroke="#424242" stroke-width="1.5"/>
  <path d="M 40,150 Q 60,140 80,150" fill="none" stroke="#424242" stroke-width="1.5"/>
  <text x="60" y="165" text-anchor="middle" font-size="9" fill="#424242">Bucket Owner</text>
  <text x="60" y="178" text-anchor="middle" font-size="8" fill="#757575">(has IAM access)</text>

  <!-- AWS Cloud box -->
  <rect x="100" y="96" width="180" height="104" rx="6" fill="#f9fbe7" stroke="#558b2f" stroke-width="1.5"/>
  <text x="190" y="114" text-anchor="middle" font-size="9" fill="#33691e" font-weight="bold">AWS Cloud</text>
  <!-- S3 bucket icon -->
  <rect x="120" y="122" width="60" height="52" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="150" y="142" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">S3</text>
  <text x="150" y="156" text-anchor="middle" font-size="8" fill="#2e7d32">private</text>
  <text x="150" y="168" text-anchor="middle" font-size="8" fill="#2e7d32">bucket</text>
  <!-- IAM creds used -->
  <rect x="192" y="122" width="80" height="52" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="232" y="140" text-anchor="middle" font-size="8" fill="#0d47a1" font-weight="bold">IAM Creds</text>
  <text x="232" y="153" text-anchor="middle" font-size="8" fill="#1565c0">used to sign</text>
  <text x="232" y="166" text-anchor="middle" font-size="8" fill="#1565c0">the URL</text>

  <!-- Arrow from owner to AWS -->
  <line x1="82" y1="128" x2="100" y2="140" stroke="#1565c0" stroke-width="1.8" marker-end="url(#aB6)"/>
  <defs>
    <marker id="aB6" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#1565c0"/></marker>
    <marker id="aG6" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#2e7d32"/></marker>
    <marker id="aO6" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#e65100"/></marker>
  </defs>

  <!-- Presigned URL output box -->
  <rect x="30" y="225" width="250" height="76" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="155" y="242" text-anchor="middle" font-size="9" fill="#bf360c" font-weight="bold">Generated Presigned URL</text>
  <text x="42" y="258" font-size="7.5" fill="#424242" font-family="'Courier New', monospace">https://bucket.s3.amazonaws.com/</text>
  <text x="42" y="270" font-size="7.5" fill="#424242" font-family="'Courier New', monospace">report.pdf?X-Amz-Algorithm=</text>
  <text x="42" y="282" font-size="7.5" fill="#424242" font-family="'Courier New', monospace">AWS4-HMAC-SHA256&amp;X-Amz-Expires=</text>
  <text x="42" y="294" font-size="7.5" fill="#e65100" font-family="'Courier New', monospace">3600 (1 hour TTL)</text>

  <!-- Arrow cloud to URL box -->
  <line x1="155" y1="200" x2="155" y2="224" stroke="#e65100" stroke-width="1.8" marker-end="url(#aO6)"/>

  <!-- ── STEP 2: Share URL ── -->
  <!-- Arrow URL → recipient -->
  <line x1="280" y1="263" x2="318" y2="263" stroke="#e65100" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#aO6)"/>
  <text x="299" y="255" text-anchor="middle" font-size="8" fill="#e65100">share via</text>
  <text x="299" y="274" text-anchor="middle" font-size="8" fill="#e65100">email / API</text>

  <!-- Email/chat icon -->
  <rect x="318" y="240" width="90" height="46" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="363" y="260" text-anchor="middle" font-size="9" fill="#424242" font-weight="bold">Email / Slack</text>
  <text x="363" y="276" text-anchor="middle" font-size="8" fill="#757575">URL delivered</text>
  <text x="363" y="288" text-anchor="middle" font-size="8" fill="#757575">out-of-band</text>

  <!-- Expiry note -->
  <rect x="318" y="310" width="280" height="58" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="458" y="328" text-anchor="middle" font-size="9" fill="#b71c1c" font-weight="bold">Expiry Behaviour</text>
  <text x="330" y="344" font-size="8" fill="#424242">• Console: max 12 hours (temp credentials)</text>
  <text x="330" y="357" font-size="8" fill="#424242">• CLI / SDK: up to 7 days (long-term IAM creds)</text>
  <text x="330" y="370" font-size="8" fill="#c62828">• After expiry → 403 Forbidden</text>

  <!-- ── STEP 3: External user accesses ── -->
  <!-- External user person -->
  <circle cx="670" cy="130" r="20" fill="none" stroke="#424242" stroke-width="2"/>
  <circle cx="670" cy="118" r="7" fill="none" stroke="#424242" stroke-width="1.5"/>
  <path d="M 650,150 Q 670,140 690,150" fill="none" stroke="#424242" stroke-width="1.5"/>
  <text x="670" y="165" text-anchor="middle" font-size="9" fill="#424242">External User</text>
  <text x="670" y="178" text-anchor="middle" font-size="8" fill="#757575">(no AWS account needed)</text>

  <!-- Arrow external user → S3 (via URL) -->
  <line x1="692" y1="140" x2="760" y2="160" stroke="#2e7d32" stroke-width="2" marker-end="url(#aG6)"/>
  <text x="726" y="143" text-anchor="middle" font-size="8" fill="#2e7d32">HTTPS GET</text>
  <text x="726" y="155" text-anchor="middle" font-size="8" fill="#2e7d32">with signed URL</text>

  <!-- S3 validates box -->
  <rect x="760" y="96" width="118" height="84" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="819" y="114" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">S3 Validates</text>
  <text x="819" y="128" text-anchor="middle" font-size="8" fill="#2e7d32">• Signature OK?</text>
  <text x="819" y="141" text-anchor="middle" font-size="8" fill="#2e7d32">• Not expired?</text>
  <text x="819" y="154" text-anchor="middle" font-size="8" fill="#2e7d32">• Owner IAM still</text>
  <text x="819" y="167" text-anchor="middle" font-size="8" fill="#2e7d32">  has permission?</text>

  <!-- Success response arrow -->
  <line x1="819" y1="180" x2="819" y2="230" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#aG6)"/>
  <rect x="760" y="230" width="118" height="30" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="819" y="244" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">200 OK</text>
  <text x="819" y="256" text-anchor="middle" font-size="8" fill="#2e7d32">Object returned</text>

  <!-- Revoke note -->
  <rect x="620" y="310" width="260" height="58" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="750" y="328" text-anchor="middle" font-size="9" fill="#bf360c" font-weight="bold">How to Revoke Early</text>
  <text x="632" y="344" font-size="8" fill="#424242">• Delete/rotate the signing IAM user's key</text>
  <text x="632" y="357" font-size="8" fill="#424242">• Deactivate the key in IAM → all URLs signed</text>
  <text x="632" y="370" font-size="8" fill="#424242">  with it become invalid immediately</text>

</svg>
