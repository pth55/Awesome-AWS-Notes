<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="340" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-size="14" fill="#1a237e" font-weight="bold">Task 3: Host a Static Website on S3</text>

  <!-- User -->
  <circle cx="80" cy="180" r="20" fill="none" stroke="#424242" stroke-width="2"/>
  <circle cx="80" cy="168" r="7" fill="none" stroke="#424242" stroke-width="1.5"/>
  <path d="M 60,200 Q 80,190 100,200" fill="none" stroke="#424242" stroke-width="1.5"/>
  <text x="80" y="230" text-anchor="middle" font-size="9" fill="#424242">Browser</text>
  <text x="80" y="242" text-anchor="middle" font-size="8" fill="#757575">HTTP Request</text>

  <!-- Arrow: User to S3 -->
  <line x1="110" y1="180" x2="240" y2="180" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue3)"/>
  <defs>
    <marker id="arrowBlue3" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#1565c0"/>
    </marker>
  </defs>
  <text x="175" y="170" text-anchor="middle" font-size="8" fill="#1565c0">http://bucket.s3-website</text>
  <text x="175" y="182" text-anchor="middle" font-size="8" fill="#1565c0">-region.amazonaws.com</text>

  <!-- AWS Cloud boundary -->
  <rect x="240" y="50" width="520" height="270" rx="8" fill="#f9fbe7" stroke="#558b2f" stroke-width="2"/>
  <text x="260" y="70" font-size="10" fill="#33691e" font-weight="bold">AWS Cloud</text>

  <!-- S3 Bucket with website hosting -->
  <rect x="270" y="90" width="240" height="200" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="390" y="112" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">S3 Bucket</text>
  <text x="390" y="126" text-anchor="middle" font-size="9" fill="#2e7d32">my-static-website</text>

  <!-- Website hosting badge -->
  <rect x="290" y="135" width="200" height="20" rx="3" fill="#1565c0"/>
  <text x="390" y="149" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Static Website Hosting: Enabled</text>

  <!-- Files -->
  <rect x="290" y="165" width="90" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="335" y="177" text-anchor="middle" font-size="8" fill="#1b5e20">index.html</text>

  <rect x="390" y="165" width="90" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="435" y="177" text-anchor="middle" font-size="8" fill="#1b5e20">error.html</text>

  <rect x="290" y="190" width="90" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="335" y="202" text-anchor="middle" font-size="8" fill="#1b5e20">style.css</text>

  <rect x="390" y="190" width="90" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="435" y="202" text-anchor="middle" font-size="8" fill="#1b5e20">app.js</text>

  <!-- Bucket Policy -->
  <rect x="290" y="220" width="200" height="40" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="390" y="236" text-anchor="middle" font-size="8" fill="#bf360c" font-weight="bold">Bucket Policy</text>
  <text x="390" y="250" text-anchor="middle" font-size="8" fill="#e65100">Principal: * → s3:GetObject</text>

  <!-- Configuration panel -->
  <rect x="540" y="90" width="200" height="200" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="640" y="112" text-anchor="middle" font-size="10" fill="#0d47a1" font-weight="bold">Configuration</text>

  <text x="560" y="135" font-size="9" fill="#424242">Index document:</text>
  <text x="560" y="148" font-size="9" fill="#1565c0" font-weight="bold">  index.html</text>

  <text x="560" y="170" font-size="9" fill="#424242">Error document:</text>
  <text x="560" y="183" font-size="9" fill="#1565c0" font-weight="bold">  error.html</text>

  <text x="560" y="205" font-size="9" fill="#424242">Block Public Access:</text>
  <text x="560" y="218" font-size="9" fill="#c62828" font-weight="bold">  Disabled</text>

  <text x="560" y="240" font-size="9" fill="#424242">ACLs:</text>
  <text x="560" y="253" font-size="9" fill="#1565c0" font-weight="bold">  BucketOwnerEnforced</text>

  <text x="560" y="275" font-size="9" fill="#424242">Public access via:</text>
  <text x="560" y="288" font-size="9" fill="#1565c0" font-weight="bold">  Bucket Policy</text>

</svg>
