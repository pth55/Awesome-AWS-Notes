<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="14" fill="#1a237e" font-weight="bold">Task 4: Bucket Policy + Block Public Access</text>

  <!-- ── AWS Cloud boundary ── -->
  <rect x="260" y="44" width="620" height="358" rx="8" fill="#f9fbe7" stroke="#558b2f" stroke-width="2"/>
  <text x="280" y="64" font-size="10" fill="#33691e" font-weight="bold">AWS Cloud</text>

  <!-- S3 Bucket box -->
  <rect x="330" y="80" width="280" height="290" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="470" y="102" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">S3 Bucket</text>
  <text x="470" y="116" text-anchor="middle" font-size="9" fill="#2e7d32">my-app-bucket</text>

  <!-- Block Public Access toggle ON -->
  <rect x="350" y="128" width="240" height="34" rx="5" fill="#c62828"/>
  <text x="470" y="143" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Block ALL Public Access: ON</text>
  <text x="470" y="156" text-anchor="middle" font-size="8" fill="#ffcdd2">Overrides bucket policy for public traffic</text>

  <!-- Bucket Policy section -->
  <rect x="350" y="174" width="240" height="112" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="470" y="190" text-anchor="middle" font-size="9" fill="#bf360c" font-weight="bold">Bucket Policy (Resource-based)</text>
  <text x="362" y="207" font-size="8" fill="#424242" font-family="'Courier New', monospace">{</text>
  <text x="362" y="220" font-size="8" fill="#424242" font-family="'Courier New', monospace">  "Effect": "Allow",</text>
  <text x="362" y="233" font-size="8" fill="#1565c0" font-family="'Courier New', monospace">  "Principal": {"AWS": "arn:role"},</text>
  <text x="362" y="246" font-size="8" fill="#424242" font-family="'Courier New', monospace">  "Action": "s3:GetObject",</text>
  <text x="362" y="259" font-size="8" fill="#424242" font-family="'Courier New', monospace">  "Resource": "arn:s3:::bucket/*"</text>
  <text x="362" y="272" font-size="8" fill="#424242" font-family="'Courier New', monospace">}</text>

  <!-- Objects inside -->
  <rect x="362" y="300" width="80" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="402" y="312" text-anchor="middle" font-size="8" fill="#1b5e20">report.pdf</text>
  <rect x="452" y="300" width="80" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="492" y="312" text-anchor="middle" font-size="8" fill="#1b5e20">data.csv</text>

  <!-- Objects label -->
  <text x="470" y="340" text-anchor="middle" font-size="8" fill="#757575">Objects (private by default)</text>

  <!-- IAM Role / Allowed path -->
  <rect x="640" y="110" width="200" height="70" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="740" y="132" text-anchor="middle" font-size="10" fill="#0d47a1" font-weight="bold">IAM Role / User</text>
  <text x="740" y="148" text-anchor="middle" font-size="9" fill="#1565c0">app-server-role</text>
  <text x="740" y="162" text-anchor="middle" font-size="8" fill="#0d47a1">Has s3:GetObject in IAM policy</text>

  <!-- Arrow: IAM Role → bucket (ALLOWED) -->
  <line x1="640" y1="145" x2="614" y2="220" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowG)"/>
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#2e7d32"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#c62828"/>
    </marker>
  </defs>
  <rect x="618" y="158" width="52" height="16" rx="3" fill="#c8e6c9"/>
  <text x="644" y="169" text-anchor="middle" font-size="8" fill="#1b5e20" font-weight="bold">ALLOWED</text>

  <!-- Anonymous user / Blocked path -->
  <rect x="640" y="240" width="200" height="60" rx="5" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="740" y="262" text-anchor="middle" font-size="10" fill="#b71c1c" font-weight="bold">Anonymous User</text>
  <text x="740" y="278" text-anchor="middle" font-size="9" fill="#c62828">Public internet request</text>
  <text x="740" y="292" text-anchor="middle" font-size="8" fill="#c62828">No credentials</text>

  <!-- Arrow: Anonymous → bucket (BLOCKED) -->
  <line x1="640" y1="265" x2="614" y2="265" stroke="#c62828" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
  <rect x="618" y="255" width="52" height="16" rx="3" fill="#ffcdd2"/>
  <text x="644" y="266" text-anchor="middle" font-size="8" fill="#b71c1c" font-weight="bold">BLOCKED</text>
  <!-- X mark on arrow -->
  <line x1="634" y1="257" x2="642" y2="265" stroke="#c62828" stroke-width="2"/>
  <line x1="642" y1="257" x2="634" y2="265" stroke="#c62828" stroke-width="2"/>

  <!-- Left: User with IAM identity -->
  <circle cx="90" cy="190" r="22" fill="none" stroke="#424242" stroke-width="2"/>
  <circle cx="90" cy="177" r="8" fill="none" stroke="#424242" stroke-width="1.5"/>
  <path d="M 68,210 Q 90,198 112,210" fill="none" stroke="#424242" stroke-width="1.5"/>
  <text x="90" y="225" text-anchor="middle" font-size="9" fill="#424242">Developer</text>
  <text x="90" y="238" text-anchor="middle" font-size="8" fill="#757575">console / CLI</text>

  <!-- Arrow: User → IAM Role -->
  <line x1="130" y1="180" x2="258" y2="145" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#1565c0"/>
    </marker>
  </defs>
  <text x="190" y="152" text-anchor="middle" font-size="8" fill="#1565c0">assumes role /</text>
  <text x="190" y="164" text-anchor="middle" font-size="8" fill="#1565c0">uses IAM creds</text>

  <!-- Evaluation order note -->
  <rect x="10" y="330" width="238" height="78" rx="5" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.2"/>
  <text x="129" y="348" text-anchor="middle" font-size="9" fill="#4a148c" font-weight="bold">Access Evaluation Order</text>
  <text x="22" y="364" font-size="8" fill="#424242">1. Block Public Access (overrides all)</text>
  <text x="22" y="378" font-size="8" fill="#424242">2. IAM Identity Policy</text>
  <text x="22" y="392" font-size="8" fill="#424242">3. Bucket Policy (resource-based)</text>
  <text x="22" y="406" font-size="8" fill="#757575">   All must allow → request succeeds</text>

</svg>
