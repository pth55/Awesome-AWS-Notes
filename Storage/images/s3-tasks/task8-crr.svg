<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="14" fill="#1a237e" font-weight="bold">Task 8: Cross-Region Replication (CRR)</text>

  <!-- Source region box -->
  <rect x="20" y="44" width="360" height="350" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="200" y="66" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">Source Region (us-east-1)</text>

  <!-- Source S3 Bucket -->
  <rect x="60" y="80" width="280" height="180" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="200" y="102" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Primary S3 Bucket</text>
  <text x="200" y="116" text-anchor="middle" font-size="9" fill="#2e7d32">primary-s3-bucket</text>

  <!-- Versioning badge -->
  <rect x="80" y="126" width="120" height="22" rx="4" fill="#1565c0"/>
  <text x="140" y="141" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Versioning: Enabled</text>

  <!-- Lifecycle badge -->
  <rect x="212" y="126" width="110" height="22" rx="4" fill="#e65100"/>
  <text x="267" y="141" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Lifecycle: keep 3</text>

  <!-- Objects -->
  <rect x="80" y="160" width="70" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="115" y="172" text-anchor="middle" font-size="8" fill="#1b5e20">backup-1.tar</text>
  <rect x="160" y="160" width="70" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="195" y="172" text-anchor="middle" font-size="8" fill="#1b5e20">backup-2.tar</text>
  <rect x="240" y="160" width="70" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="275" y="172" text-anchor="middle" font-size="8" fill="#1b5e20">logs.zip</text>

  <!-- Replication Rule label inside bucket -->
  <rect x="80" y="192" width="240" height="54" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="200" y="210" text-anchor="middle" font-size="9" fill="#bf360c" font-weight="bold">Replication Rule</text>
  <text x="92" y="225" font-size="8" fill="#424242">• Scope: entire bucket</text>
  <text x="92" y="238" font-size="8" fill="#424242">• Storage class: Standard (dest)</text>

  <!-- IAM Replication Role -->
  <rect x="60" y="278" width="280" height="50" rx="5" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.2"/>
  <text x="200" y="296" text-anchor="middle" font-size="9" fill="#4a148c" font-weight="bold">IAM Replication Role</text>
  <text x="72" y="310" font-size="8" fill="#424242">s3:ReplicateObject · s3:ReplicateDelete</text>
  <text x="72" y="323" font-size="8" fill="#424242">s3:GetObjectVersion · s3:GetReplicationConf</text>

  <!-- Center replication arrows -->
  <defs>
    <marker id="arrowBlue8" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#1565c0"/></marker>
    <marker id="arrowGreen8" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#2e7d32"/></marker>
  </defs>

  <!-- Replication arrow (top) -->
  <line x1="380" y1="155" x2="520" y2="155" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowBlue8)"/>
  <text x="450" y="143" text-anchor="middle" font-size="9" fill="#1565c0" font-weight="bold">Async Replication</text>
  <text x="450" y="158" text-anchor="middle" font-size="8" fill="#424242">TLS encrypted in transit</text>

  <!-- Sub-label (seconds delay) -->
  <text x="450" y="172" text-anchor="middle" font-size="8" fill="#757575">Usually seconds, up to 15 min</text>

  <!-- Replication arrow (objects) -->
  <line x1="380" y1="210" x2="520" y2="210" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue8)"/>

  <!-- Destination region box -->
  <rect x="520" y="44" width="360" height="350" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="700" y="66" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Destination Region (eu-west-1)</text>

  <!-- Destination S3 Bucket -->
  <rect x="560" y="80" width="280" height="180" rx="6" fill="#c8e6c9" stroke="#1b5e20" stroke-width="1.8"/>
  <text x="700" y="102" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Secondary S3 Bucket</text>
  <text x="700" y="116" text-anchor="middle" font-size="9" fill="#2e7d32">secondary-s3-bucket</text>

  <!-- Versioning badge (required for CRR dest) -->
  <rect x="580" y="126" width="120" height="22" rx="4" fill="#1565c0"/>
  <text x="640" y="141" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Versioning: Enabled</text>

  <!-- Lifecycle badge -->
  <rect x="712" y="126" width="110" height="22" rx="4" fill="#e65100"/>
  <text x="767" y="141" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Lifecycle: keep 5</text>

  <!-- Replicated Objects -->
  <rect x="580" y="160" width="70" height="18" rx="3" fill="#a5d6a7" stroke="#43a047" stroke-width="1"/>
  <text x="615" y="172" text-anchor="middle" font-size="8" fill="#1b5e20">backup-1.tar</text>
  <rect x="660" y="160" width="70" height="18" rx="3" fill="#a5d6a7" stroke="#43a047" stroke-width="1"/>
  <text x="695" y="172" text-anchor="middle" font-size="8" fill="#1b5e20">backup-2.tar</text>
  <rect x="740" y="160" width="70" height="18" rx="3" fill="#a5d6a7" stroke="#43a047" stroke-width="1"/>
  <text x="775" y="172" text-anchor="middle" font-size="8" fill="#1b5e20">logs.zip</text>

  <!-- Replica note -->
  <rect x="580" y="192" width="240" height="54" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="700" y="210" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Replicas (read-only copy)</text>
  <text x="592" y="225" font-size="8" fill="#424242">• Same version IDs as source</text>
  <text x="592" y="238" font-size="8" fill="#424242">• Owner: destination account</text>

  <!-- Requirements note -->
  <rect x="560" y="278" width="280" height="50" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="700" y="296" text-anchor="middle" font-size="9" fill="#bf360c" font-weight="bold">Requirements</text>
  <text x="572" y="310" font-size="8" fill="#424242">• Versioning enabled on BOTH buckets</text>
  <text x="572" y="323" font-size="8" fill="#424242">• Replication role with correct permissions</text>

  <!-- Key notes at bottom -->
  <rect x="20" y="404" width="860" height="0" rx="0"/>
  <text x="130" y="395" text-anchor="middle" font-size="8" fill="#616161">Existing objects NOT replicated automatically — use S3 Batch Replication for backfill</text>
  <text x="680" y="395" text-anchor="middle" font-size="8" fill="#616161">Delete markers: replicated only if DeleteMarkerReplication is enabled in rule</text>

</svg>
