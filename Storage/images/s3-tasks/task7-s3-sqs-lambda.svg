<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="14" fill="#1a237e" font-weight="bold">Task 7: S3 Event Notification → SQS → Lambda Pipeline</text>

  <!-- AWS Cloud boundary -->
  <rect x="160" y="44" width="720" height="360" rx="8" fill="#f9fbe7" stroke="#558b2f" stroke-width="2"/>
  <text x="180" y="64" font-size="10" fill="#33691e" font-weight="bold">AWS Cloud</text>

  <!-- User (left) -->
  <circle cx="80" cy="210" r="22" fill="none" stroke="#424242" stroke-width="2"/>
  <circle cx="80" cy="197" r="8" fill="none" stroke="#424242" stroke-width="1.5"/>
  <path d="M 58,230 Q 80,220 102,230" fill="none" stroke="#424242" stroke-width="1.5"/>
  <text x="80" y="246" text-anchor="middle" font-size="9" fill="#424242">User</text>

  <!-- Arrow User → S3 -->
  <line x1="104" y1="210" x2="196" y2="210" stroke="#424242" stroke-width="2" marker-end="url(#arrowDark)"/>
  <defs>
    <marker id="arrowDark" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#424242"/></marker>
    <marker id="arrowGreen7" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#2e7d32"/></marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#880e4f"/></marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#e65100"/></marker>
  </defs>
  <text x="150" y="200" text-anchor="middle" font-size="8" fill="#424242">Upload file</text>
  <text x="150" y="213" text-anchor="middle" font-size="8" fill="#424242">to input/</text>

  <!-- File icon above arrow -->
  <rect x="138" y="162" width="26" height="32" rx="2" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
  <line x1="142" y1="170" x2="160" y2="170" stroke="#9e9e9e" stroke-width="1"/>
  <line x1="142" y1="177" x2="160" y2="177" stroke="#9e9e9e" stroke-width="1"/>
  <line x1="142" y1="184" x2="160" y2="184" stroke="#9e9e9e" stroke-width="1"/>
  <text x="151" y="208" text-anchor="middle" font-size="7" fill="#616161">file.txt</text>

  <!-- S3 Bucket -->
  <rect x="196" y="160" width="130" height="100" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="261" y="184" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">S3 Bucket</text>
  <!-- Bucket icon shape (simplified) -->
  <ellipse cx="261" cy="196" rx="30" ry="8" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="231" y1="196" x2="231" y2="220" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="291" y1="196" x2="291" y2="220" stroke="#2e7d32" stroke-width="1.5"/>
  <ellipse cx="261" cy="220" rx="30" ry="8" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>

  <!-- Folder labels inside bucket -->
  <rect x="216" y="228" width="44" height="16" rx="3" fill="#a5d6a7" stroke="#43a047" stroke-width="1"/>
  <text x="238" y="239" text-anchor="middle" font-size="8" fill="#1b5e20">input/</text>
  <rect x="264" y="228" width="48" height="16" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="288" y="239" text-anchor="middle" font-size="8" fill="#f57f17">output/</text>

  <!-- Event notification arrow to SQS -->
  <line x1="326" y1="210" x2="418" y2="210" stroke="#880e4f" stroke-width="2" marker-end="url(#arrowPink)"/>
  <text x="372" y="200" text-anchor="middle" font-size="8" fill="#880e4f" font-weight="bold">Event notification</text>
  <text x="372" y="213" text-anchor="middle" font-size="8" fill="#880e4f">s3:ObjectCreated:*</text>
  <text x="372" y="226" text-anchor="middle" font-size="8" fill="#880e4f">prefix: input/</text>

  <!-- SQS Queue -->
  <rect x="418" y="160" width="130" height="100" rx="6" fill="#fce4ec" stroke="#880e4f" stroke-width="2"/>
  <text x="483" y="182" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold">SQS Queue</text>
  <!-- SQS icon simplified: queue of messages -->
  <rect x="436" y="192" width="90" height="16" rx="3" fill="#f48fb1" stroke="#c2185b" stroke-width="1"/>
  <text x="481" y="203" text-anchor="middle" font-size="8" fill="white">msg: { bucket, key }</text>
  <rect x="436" y="212" width="90" height="16" rx="3" fill="#f8bbd0" stroke="#c2185b" stroke-width="1"/>
  <text x="481" y="223" text-anchor="middle" font-size="8" fill="#880e4f">msg: pending...</text>
  <rect x="436" y="232" width="90" height="16" rx="3" fill="#fce4ec" stroke="#f48fb1" stroke-width="1"/>
  <text x="481" y="243" text-anchor="middle" font-size="8" fill="#ad1457">msg: pending...</text>

  <!-- Arrow SQS → Lambda -->
  <line x1="548" y1="210" x2="640" y2="210" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="594" y="200" text-anchor="middle" font-size="8" fill="#e65100" font-weight="bold">Trigger lambda</text>
  <text x="594" y="213" text-anchor="middle" font-size="8" fill="#e65100">handler (polls</text>
  <text x="594" y="226" text-anchor="middle" font-size="8" fill="#e65100">SQS via ESM)</text>

  <!-- Lambda Function -->
  <rect x="640" y="160" width="130" height="100" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="705" y="182" text-anchor="middle" font-size="11" fill="#bf360c" font-weight="bold">Lambda</text>
  <!-- Lambda λ symbol -->
  <text x="705" y="225" text-anchor="middle" font-size="38" fill="#e65100" opacity="0.3" font-weight="bold">λ</text>
  <text x="705" y="248" text-anchor="middle" font-size="8" fill="#e65100">Reads S3 key from msg</text>
  <text x="705" y="260" text-anchor="middle" font-size="8" fill="#e65100">Transforms content</text>

  <!-- Arrow Lambda → S3 output (curved back) -->
  <path d="M 705,260 Q 705,330 490,350 Q 290,370 261,260" fill="none" stroke="#2e7d32" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen7)"/>
  <text x="490" y="375" text-anchor="middle" font-size="8" fill="#2e7d32" font-weight="bold">Store processed file to output/</text>

  <!-- Flow step numbers -->
  <circle cx="150" cy="175" r="10" fill="#1565c0"/>
  <text x="150" y="179" text-anchor="middle" font-size="9" fill="white" font-weight="bold">1</text>

  <circle cx="372" cy="186" r="10" fill="#880e4f"/>
  <text x="372" y="190" text-anchor="middle" font-size="9" fill="white" font-weight="bold">2</text>

  <circle cx="594" cy="186" r="10" fill="#e65100"/>
  <text x="594" y="190" text-anchor="middle" font-size="9" fill="white" font-weight="bold">3</text>

  <circle cx="490" cy="362" r="10" fill="#2e7d32"/>
  <text x="490" y="366" text-anchor="middle" font-size="9" fill="white" font-weight="bold">4</text>

  <!-- Legend notes at bottom -->
  <rect x="170" y="290" width="160" height="100" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="250" y="308" text-anchor="middle" font-size="8" fill="#424242" font-weight="bold">Configuration Required</text>
  <text x="182" y="322" font-size="7.5" fill="#424242">• S3 → Event notification → SQS</text>
  <text x="182" y="335" font-size="7.5" fill="#424242">• SQS → Lambda trigger (ESM)</text>
  <text x="182" y="348" font-size="7.5" fill="#424242">• Lambda execution role:</text>
  <text x="182" y="361" font-size="7.5" fill="#424242">   s3:GetObject + s3:PutObject</text>
  <text x="182" y="374" font-size="7.5" fill="#424242">   sqs:ReceiveMessage + Delete</text>

</svg>
