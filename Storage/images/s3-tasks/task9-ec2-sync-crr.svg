<?xml version="1.0" encoding="UTF-8"?>
<svg width="920" height="460" viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="14" fill="#1a237e" font-weight="bold">Task 9: EC2 Cron Sync to S3 + Cross-Region Replication</text>

  <!-- Primary Region box -->
  <rect x="10" y="44" width="570" height="400" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="295" y="64" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">Primary Region (us-east-1)</text>

  <!-- EC2 Instance -->
  <rect x="30" y="80" width="200" height="200" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.8"/>
  <text x="130" y="102" text-anchor="middle" font-size="11" fill="#bf360c" font-weight="bold">EC2 Instance</text>
  <text x="130" y="116" text-anchor="middle" font-size="9" fill="#e65100">Amazon Linux 2023</text>

  <!-- /backups directory -->
  <rect x="50" y="126" width="160" height="56" rx="4" fill="#fff9c4" stroke="#f9a825" stroke-width="1.2"/>
  <text x="130" y="144" text-anchor="middle" font-size="9" fill="#f57f17" font-weight="bold">/backups directory</text>
  <rect x="60" y="154" width="60" height="14" rx="2" fill="#ffe082" stroke="#ffa000" stroke-width="1"/>
  <text x="90" y="164" text-anchor="middle" font-size="7" fill="#f57f17">app.log</text>
  <rect x="130" y="154" width="60" height="14" rx="2" fill="#ffe082" stroke="#ffa000" stroke-width="1"/>
  <text x="160" y="164" text-anchor="middle" font-size="7" fill="#f57f17">db.dump</text>

  <!-- Cron job box -->
  <rect x="50" y="196" width="160" height="56" rx="4" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.2"/>
  <text x="130" y="214" text-anchor="middle" font-size="9" fill="#283593" font-weight="bold">Cron Job (every 1 min)</text>
  <text x="58" y="230" font-size="7.5" fill="#424242" font-family="'Courier New', monospace">* * * * * aws s3 sync</text>
  <text x="58" y="243" font-size="7.5" fill="#424242" font-family="'Courier New', monospace">/backups s3://primary-bucket</text>
  <text x="58" y="256" font-size="7.5" fill="#1565c0" font-family="'Courier New', monospace">&gt;&gt; sync_s3.log</text>

  <!-- IAM Role -->
  <rect x="50" y="264" width="160" height="46" rx="4" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="130" y="282" text-anchor="middle" font-size="9" fill="#4a148c" font-weight="bold">IAM Instance Role</text>
  <text x="60" y="296" font-size="7.5" fill="#424242">s3:ListBucket</text>
  <text x="60" y="308" font-size="7.5" fill="#424242">s3:GetObject · s3:PutObject</text>

  <!-- Arrow EC2 → Primary S3 -->
  <defs>
    <marker id="arrowB9" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#1565c0"/></marker>
    <marker id="arrowG9" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#2e7d32"/></marker>
    <marker id="arrowO9" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#e65100"/></marker>
  </defs>

  <line x1="232" y1="190" x2="318" y2="190" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowB9)"/>
  <text x="275" y="180" text-anchor="middle" font-size="8" fill="#1565c0" font-weight="bold">aws s3 sync</text>
  <text x="275" y="193" text-anchor="middle" font-size="8" fill="#424242">every minute</text>

  <!-- Primary S3 Bucket -->
  <rect x="318" y="80" width="240" height="200" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="438" y="102" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Primary S3 Bucket</text>
  <text x="438" y="116" text-anchor="middle" font-size="9" fill="#2e7d32">primary-s3-bucket (us-east-1)</text>

  <!-- Versioning -->
  <rect x="338" y="126" width="110" height="20" rx="4" fill="#1565c0"/>
  <text x="393" y="140" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Versioning: ON</text>

  <!-- Lifecycle keep 3 -->
  <rect x="458" y="126" width="80" height="20" rx="4" fill="#e65100"/>
  <text x="498" y="140" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Keep 3 ver.</text>

  <!-- Objects -->
  <rect x="338" y="156" width="80" height="16" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="378" y="167" text-anchor="middle" font-size="7.5" fill="#1b5e20">app.log (v3)</text>
  <rect x="428" y="156" width="80" height="16" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="468" y="167" text-anchor="middle" font-size="7.5" fill="#1b5e20">db.dump (v2)</text>

  <!-- IAM policy note -->
  <rect x="338" y="182" width="200" height="42" rx="3" fill="#e8eaf6" stroke="#3949ab" stroke-width="1"/>
  <text x="438" y="198" text-anchor="middle" font-size="8" fill="#283593" font-weight="bold">Customer Managed Policy</text>
  <text x="348" y="212" font-size="7.5" fill="#424242">ListBucket on primary-s3-bucket</text>
  <text x="348" y="224" font-size="7.5" fill="#424242">GetObject + PutObject on bucket/*</text>

  <!-- Replication rule box -->
  <rect x="338" y="236" width="200" height="34" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="438" y="252" text-anchor="middle" font-size="8" fill="#bf360c" font-weight="bold">CRR Replication Rule</text>
  <text x="438" y="264" text-anchor="middle" font-size="7.5" fill="#e65100">→ secondary-s3-bucket (eu-west-1)</text>

  <!-- Arrow Primary → Secondary -->
  <line x1="580" y1="190" x2="660" y2="190" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowG9)"/>
  <text x="620" y="178" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">CRR</text>
  <text x="620" y="192" text-anchor="middle" font-size="8" fill="#2e7d32">async</text>
  <text x="620" y="204" text-anchor="middle" font-size="8" fill="#757575">TLS enc.</text>

  <!-- Secondary Region box -->
  <rect x="660" y="44" width="250" height="250" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="785" y="64" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Secondary Region</text>
  <text x="785" y="79" text-anchor="middle" font-size="9" fill="#2e7d32">(eu-west-1)</text>

  <!-- Secondary S3 Bucket -->
  <rect x="680" y="88" width="210" height="180" rx="6" fill="#c8e6c9" stroke="#1b5e20" stroke-width="1.8"/>
  <text x="785" y="108" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">Secondary S3 Bucket</text>
  <text x="785" y="122" text-anchor="middle" font-size="8" fill="#2e7d32">secondary-s3-bucket</text>

  <!-- Versioning -->
  <rect x="700" y="132" width="110" height="20" rx="4" fill="#1565c0"/>
  <text x="755" y="146" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Versioning: ON</text>

  <!-- Lifecycle keep 5 -->
  <rect x="700" y="162" width="170" height="20" rx="4" fill="#e65100"/>
  <text x="785" y="176" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Lifecycle: keep 5 versions</text>

  <!-- Replicas -->
  <rect x="700" y="192" width="80" height="16" rx="3" fill="#a5d6a7" stroke="#43a047" stroke-width="1"/>
  <text x="740" y="203" text-anchor="middle" font-size="7.5" fill="#1b5e20">app.log ✓</text>
  <rect x="790" y="192" width="80" height="16" rx="3" fill="#a5d6a7" stroke="#43a047" stroke-width="1"/>
  <text x="830" y="203" text-anchor="middle" font-size="7.5" fill="#1b5e20">db.dump ✓</text>

  <text x="785" y="232" text-anchor="middle" font-size="8" fill="#616161" font-style="italic">Replicated automatically</text>
  <text x="785" y="244" text-anchor="middle" font-size="8" fill="#616161" font-style="italic">from primary bucket</text>

  <!-- Replication Role box -->
  <rect x="660" y="306" width="250" height="50" rx="5" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.2"/>
  <text x="785" y="324" text-anchor="middle" font-size="9" fill="#4a148c" font-weight="bold">Replication IAM Role</text>
  <text x="670" y="338" font-size="7.5" fill="#424242">s3:ReplicateObject · s3:ReplicateDelete</text>
  <text x="670" y="351" font-size="7.5" fill="#424242">Assigned to replication rule on source</text>

  <!-- Verification section -->
  <rect x="10" y="370" width="570" height="78" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="295" y="388" text-anchor="middle" font-size="9" fill="#424242" font-weight="bold">Verification Steps</text>
  <text x="22" y="404" font-size="8" fill="#424242">1. Add a file to /backups on EC2 → wait 1 min → check primary bucket for the file</text>
  <text x="22" y="418" font-size="8" fill="#424242">2. Check sync_s3.log on EC2 for successful sync output</text>
  <text x="22" y="432" font-size="8" fill="#424242">3. Wait ~1-2 min → check secondary bucket → file should appear automatically (CRR)</text>

</svg>
