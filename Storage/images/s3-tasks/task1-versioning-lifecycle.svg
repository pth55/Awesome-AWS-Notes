<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="380" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-size="14" fill="#1a237e" font-weight="bold">Task 1: S3 Bucket with Versioning and Lifecycle Policy</text>

  <!-- AWS Cloud boundary -->
  <rect x="120" y="44" width="560" height="320" rx="8" fill="#f9fbe7" stroke="#558b2f" stroke-width="2"/>
  <text x="140" y="64" font-size="10" fill="#33691e" font-weight="bold">AWS Cloud (eu-west-1)</text>

  <!-- S3 Bucket -->
  <rect x="260" y="80" width="280" height="100" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="400" y="100" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">S3 Bucket</text>
  <text x="400" y="116" text-anchor="middle" font-size="9" fill="#2e7d32">cmtr-bucket-1777441959</text>

  <!-- Versioning badge -->
  <rect x="278" y="128" width="100" height="24" rx="4" fill="#1565c0"/>
  <text x="328" y="144" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Versioning: ON</text>

  <!-- Storage class badge -->
  <rect x="422" y="128" width="100" height="24" rx="4" fill="#6a1b9a"/>
  <text x="472" y="144" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Standard</text>

  <!-- Files inside bucket -->
  <rect x="280" y="158" width="70" height="16" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="315" y="170" text-anchor="middle" font-size="8" fill="#1b5e20">file1.txt</text>
  <rect x="360" y="158" width="70" height="16" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="395" y="170" text-anchor="middle" font-size="8" fill="#1b5e20">file2.txt</text>
  <rect x="440" y="158" width="70" height="16" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="475" y="170" text-anchor="middle" font-size="8" fill="#1b5e20">file3.txt</text>

  <!-- Lifecycle Policy -->
  <rect x="180" y="220" width="440" height="120" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.8"/>
  <text x="400" y="242" text-anchor="middle" font-size="11" fill="#bf360c" font-weight="bold">Lifecycle Policy: cmtr-rule</text>

  <!-- Timeline arrow -->
  <line x1="220" y1="280" x2="580" y2="280" stroke="#616161" stroke-width="2"/>
  <polygon points="580,280 572,275 572,285" fill="#616161"/>

  <!-- Day 0 marker -->
  <circle cx="250" cy="280" r="5" fill="#2e7d32"/>
  <text x="250" y="300" text-anchor="middle" font-size="9" fill="#424242">Day 0</text>
  <text x="250" y="312" text-anchor="middle" font-size="8" fill="#616161">Noncurrent</text>

  <!-- Day 30 marker -->
  <circle cx="380" cy="280" r="5" fill="#f57c00"/>
  <text x="380" y="300" text-anchor="middle" font-size="9" fill="#424242">Day 30</text>
  <text x="380" y="312" text-anchor="middle" font-size="8" fill="#e65100">Move to Standard-IA</text>

  <!-- Day 50 marker -->
  <circle cx="540" cy="280" r="5" fill="#c62828"/>
  <text x="540" y="300" text-anchor="middle" font-size="9" fill="#424242">Day 50</text>
  <text x="540" y="312" text-anchor="middle" font-size="8" fill="#c62828">Permanently Delete</text>

  <!-- Transition arrows -->
  <path d="M 255,278 Q 315,260 375,278" fill="none" stroke="#f57c00" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 385,278 Q 460,260 535,278" fill="none" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>

</svg>
