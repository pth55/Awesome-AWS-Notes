<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="900" height="440" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="14" fill="#1a237e" font-weight="bold">FSx for OpenZFS — Volumes, Snapshots, and Instant Clones</text>

  <!-- AWS Cloud boundary -->
  <rect x="10" y="44" width="880" height="380" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="30" y="62" font-size="10" fill="#bf360c" font-weight="bold">AWS Cloud</text>

  <!-- FSx OpenZFS file system -->
  <rect x="30" y="72" width="520" height="330" rx="7" fill="#fff8f0" stroke="#e65100" stroke-width="1.8"/>
  <text x="290" y="94" text-anchor="middle" font-size="12" fill="#bf360c" font-weight="bold">FSx for OpenZFS File System</text>
  <text x="290" y="108" text-anchor="middle" font-size="9" fill="#e65100">fs-0abc9876  ·  Single-AZ  ·  NVMe SSD  ·  up to 12.5 GB/s, 1M IOPS</text>

  <!-- Root volume -->
  <rect x="50" y="118" width="480" height="40" rx="5" fill="#e65100"/>
  <text x="290" y="136" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Root Volume  /</text>
  <text x="290" y="150" text-anchor="middle" font-size="8" fill="#ffe0b2">Always exists · Cannot be deleted · Provisioned capacity: 64 GB – 512 TB</text>

  <!-- Child volumes -->
  <rect x="50" y="172" width="148" height="68" rx="5" fill="#fb8c00" stroke="#e65100" stroke-width="1.2"/>
  <text x="124" y="192" text-anchor="middle" font-size="9" fill="white" font-weight="bold">vol-prod</text>
  <text x="124" y="207" text-anchor="middle" font-size="8" fill="#fff3e0">/prod  ·  NFS mount</text>
  <text x="124" y="220" text-anchor="middle" font-size="8" fill="#fff3e0">Quota: 2 TB</text>
  <text x="124" y="233" text-anchor="middle" font-size="8" fill="#ffe0b2">compression: LZ4</text>

  <rect x="212" y="172" width="148" height="68" rx="5" fill="#ef6c00" stroke="#e65100" stroke-width="1.2"/>
  <text x="286" y="192" text-anchor="middle" font-size="9" fill="white" font-weight="bold">vol-dev</text>
  <text x="286" y="207" text-anchor="middle" font-size="8" fill="#fff3e0">/dev  ·  NFS mount</text>
  <text x="286" y="220" text-anchor="middle" font-size="8" fill="#fff3e0">Quota: 500 GB</text>
  <text x="286" y="233" text-anchor="middle" font-size="8" fill="#ffe0b2">compression: LZ4</text>

  <rect x="374" y="172" width="148" height="68" rx="5" fill="#e65100" stroke="#bf360c" stroke-width="1.2"/>
  <text x="448" y="192" text-anchor="middle" font-size="9" fill="white" font-weight="bold">vol-staging</text>
  <text x="448" y="207" text-anchor="middle" font-size="8" fill="#fff3e0">/staging  ·  NFS</text>
  <text x="448" y="220" text-anchor="middle" font-size="8" fill="#fff3e0">Quota: 1 TB</text>
  <text x="448" y="233" text-anchor="middle" font-size="8" fill="#ffe0b2">compression: LZ4</text>

  <!-- Snapshot section -->
  <rect x="50" y="258" width="220" height="128" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="160" y="276" text-anchor="middle" font-size="9" fill="#bf360c" font-weight="bold">ZFS Snapshots</text>
  <text x="160" y="291" text-anchor="middle" font-size="8" fill="#424242">(Copy-on-Write — instant)</text>

  <rect x="62" y="298" width="196" height="18" rx="3" fill="#ffcc80" stroke="#ffa000" stroke-width="1"/>
  <text x="160" y="310" text-anchor="middle" font-size="8" fill="#e65100">snap-2026-04-29-00:00  (daily)</text>
  <rect x="62" y="320" width="196" height="18" rx="3" fill="#ffcc80" stroke="#ffa000" stroke-width="1"/>
  <text x="160" y="332" text-anchor="middle" font-size="8" fill="#e65100">snap-2026-04-28-00:00  (daily)</text>
  <rect x="62" y="342" width="196" height="18" rx="3" fill="#ffe082" stroke="#ffa000" stroke-width="0.8"/>
  <text x="160" y="354" text-anchor="middle" font-size="8" fill="#e65100">snap-2026-04-27-00:00  (daily)</text>
  <text x="160" y="376" text-anchor="middle" font-size="8" fill="#757575">Up to 10,000 snapshots per volume</text>

  <!-- Clone section -->
  <rect x="290" y="258" width="240" height="128" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="410" y="276" text-anchor="middle" font-size="9" fill="#bf360c" font-weight="bold">FlexClone (Zero-Cost)</text>
  <text x="410" y="291" text-anchor="middle" font-size="8" fill="#424242">Created instantly from any snapshot</text>

  <rect x="302" y="300" width="216" height="44" rx="4" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="410" y="318" text-anchor="middle" font-size="8.5" fill="#bf360c" font-weight="bold">clone-from-snap-0429</text>
  <text x="410" y="332" text-anchor="middle" font-size="8" fill="#424242">Shares blocks with parent · 0 extra</text>
  <text x="410" y="344" text-anchor="middle" font-size="8" fill="#424242">storage until data diverges</text>

  <text x="410" y="374" text-anchor="middle" font-size="8" fill="#1565c0">Mount as separate NFS share for testing</text>

  <!-- Clone arrow from snapshot -->
  <defs>
    <marker id="arrowO5" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#e65100"/></marker>
    <marker id="arrowG5z" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#2e7d32"/></marker>
    <marker id="arrowB5z" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#1565c0"/></marker>
  </defs>
  <line x1="272" y1="317" x2="300" y2="317" stroke="#e65100" stroke-width="1.8" stroke-dasharray="4,2" marker-end="url(#arrowO5)"/>
  <text x="286" y="309" text-anchor="middle" font-size="7.5" fill="#e65100">clone</text>

  <!-- ZFS features box -->
  <rect x="50" y="395" width="480" height="0" rx="0"/>

  <!-- Right side: EC2 clients + comparison -->
  <rect x="570" y="72" width="300" height="220" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="720" y="92" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">NFS Clients</text>

  <rect x="590" y="102" width="260" height="34" rx="4" fill="#2e7d32"/>
  <text x="720" y="117" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Linux EC2 — Production</text>
  <text x="720" y="130" text-anchor="middle" font-size="8" fill="#c8e6c9">Mounts /prod · NFSv3 or v4.1 or v4.2</text>

  <rect x="590" y="142" width="260" height="34" rx="4" fill="#43a047"/>
  <text x="720" y="157" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Linux EC2 — Dev / CI</text>
  <text x="720" y="170" text-anchor="middle" font-size="8" fill="#c8e6c9">Mounts /dev clone · isolated changes</text>

  <rect x="590" y="182" width="260" height="34" rx="4" fill="#558b2f"/>
  <text x="720" y="197" text-anchor="middle" font-size="9" fill="white" font-weight="bold">EKS Pod (Trident CSI)</text>
  <text x="720" y="210" text-anchor="middle" font-size="8" fill="#dcedc8">Dynamic PV provisioning via CSI</text>

  <rect x="590" y="222" width="260" height="34" rx="4" fill="#33691e"/>
  <text x="720" y="237" text-anchor="middle" font-size="9" fill="white" font-weight="bold">macOS (dev laptop via NFS)</text>
  <text x="720" y="250" text-anchor="middle" font-size="8" fill="#dcedc8">Remote dev mount · NFSv3</text>

  <!-- Arrow clients → FSx -->
  <line x1="570" y1="195" x2="552" y2="195" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arrowG5z)"/>

  <!-- ZFS Key features comparison -->
  <rect x="570" y="310" width="300" height="134" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.2"/>
  <text x="720" y="330" text-anchor="middle" font-size="9" fill="#212121" font-weight="bold">ZFS Feature Advantages</text>
  <text x="582" y="346" font-size="8" fill="#424242">• Block-level checksums — detects silent data corruption</text>
  <text x="582" y="360" font-size="8" fill="#424242">• Copy-on-Write (CoW) — no data corruption on crash</text>
  <text x="582" y="374" font-size="8" fill="#424242">• Transparent compression (LZ4/ZSTD) — no app changes</text>
  <text x="582" y="388" font-size="8" fill="#424242">• Snapshots are instant (metadata-only, no data copy)</text>
  <text x="582" y="402" font-size="8" fill="#424242">• Clones share blocks until diverge — 0 extra storage cost</text>
  <text x="582" y="416" font-size="8" fill="#e65100">• Cannot use cross-region replication (Single-AZ only)</text>
  <text x="582" y="430" font-size="8" fill="#e65100">• No Windows SMB — NFS / POSIX only</text>

  <!-- Volume lines from root -->
  <line x1="124" y1="158" x2="124" y2="172" stroke="#e65100" stroke-width="1.5"/>
  <line x1="286" y1="158" x2="286" y2="172" stroke="#e65100" stroke-width="1.5"/>
  <line x1="448" y1="158" x2="448" y2="172" stroke="#e65100" stroke-width="1.5"/>
  <line x1="124" y1="158" x2="448" y2="158" stroke="#e65100" stroke-width="1.5"/>

  <!-- Snapshot line from vol-prod -->
  <line x1="124" y1="240" x2="124" y2="258" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2"/>

</svg>
