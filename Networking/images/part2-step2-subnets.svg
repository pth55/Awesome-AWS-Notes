<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="720" height="400" fill="white"/>

  <!-- Region label -->
  <text x="14" y="22" font-size="12" fill="#555" font-weight="bold">AWS REGION: us-east-1</text>

  <!-- VPC boundary -->
  <rect x="10" y="30" width="700" height="350" rx="7" fill="#fdf8ff" stroke="#7b5ea7" stroke-width="2"/>
  <text x="24" y="52" font-size="13" fill="#7b5ea7" font-weight="bold">VPC: my-demo-vpc (192.168.1.0/24)</text>

  <!-- AZ us-east-1a -->
  <rect x="30" y="65" width="310" height="295" rx="5" fill="none" stroke="#bdbdbd" stroke-dasharray="6,3" stroke-width="1.5"/>
  <text x="44" y="84" font-size="11" fill="#777" font-weight="bold">AZ: us-east-1a</text>

  <!-- public-subnet-1-1a -->
  <rect x="48" y="92" width="274" height="100" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="64" y="113" font-size="12" fill="#2e7d32" font-weight="bold">public-subnet-1-1a</text>
  <text x="64" y="131" font-size="11" fill="#388e3c">192.168.1.0/26</text>
  <text x="64" y="149" font-size="10" fill="#555">Usable: .1 to .62  (59 IPs)</text>
  <text x="64" y="165" font-size="10" fill="#888">Type: Public</text>

  <!-- private-subnet-1-1a -->
  <rect x="48" y="208" width="274" height="100" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.5"/>
  <text x="64" y="229" font-size="12" fill="#1565c0" font-weight="bold">private-subnet-1-1a</text>
  <text x="64" y="247" font-size="11" fill="#1976d2">192.168.1.64/26</text>
  <text x="64" y="265" font-size="10" fill="#555">Usable: .65 to .126  (59 IPs)</text>
  <text x="64" y="281" font-size="10" fill="#888">Type: Private</text>

  <!-- AZ us-east-1b -->
  <rect x="370" y="65" width="320" height="295" rx="5" fill="none" stroke="#bdbdbd" stroke-dasharray="6,3" stroke-width="1.5"/>
  <text x="384" y="84" font-size="11" fill="#777" font-weight="bold">AZ: us-east-1b</text>

  <!-- public-subnet-2-1b -->
  <rect x="388" y="92" width="284" height="100" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="404" y="113" font-size="12" fill="#2e7d32" font-weight="bold">public-subnet-2-1b</text>
  <text x="404" y="131" font-size="11" fill="#388e3c">192.168.1.128/26</text>
  <text x="404" y="149" font-size="10" fill="#555">Usable: .129 to .190  (59 IPs)</text>
  <text x="404" y="165" font-size="10" fill="#888">Type: Public</text>

  <!-- private-subnet-2-1b -->
  <rect x="388" y="208" width="284" height="100" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.5"/>
  <text x="404" y="229" font-size="12" fill="#1565c0" font-weight="bold">private-subnet-2-1b</text>
  <text x="404" y="247" font-size="11" fill="#1976d2">192.168.1.192/26</text>
  <text x="404" y="265" font-size="10" fill="#555">Usable: .193 to .254  (59 IPs)</text>
  <text x="404" y="281" font-size="10" fill="#888">Type: Private</text>

  <!-- Status note -->
  <rect x="30" y="375" width="660" height="0" rx="3" fill="none"/>
  <text x="360" y="392" font-size="11" fill="#888" text-anchor="middle">All 4 subnets associated with Main Route Table — no internet access yet</text>
</svg>
