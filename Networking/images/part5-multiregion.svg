<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="860" height="520" fill="#ffffff"/>

  <defs>
    <!-- Purple arrowhead (right) for VPC Peering -->
    <marker id="arrow-purple-right" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7b5ea7"/>
    </marker>
    <!-- Purple arrowhead (left) for VPC Peering -->
    <marker id="arrow-purple-left" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#7b5ea7"/>
    </marker>
    <!-- Teal arrowhead (right) for TGW Peering -->
    <marker id="arrow-teal-right" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00897b"/>
    </marker>
    <!-- Teal arrowhead (left) for TGW Peering -->
    <marker id="arrow-teal-left" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#00897b"/>
    </marker>
  </defs>

  <!-- ===== REGION BOUNDARIES ===== -->

  <!-- us-east-1 region -->
  <rect x="20" y="30" width="240" height="360" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="30" y="22" font-size="11" fill="#616161" font-weight="bold">us-east-1</text>

  <!-- us-west-2 region -->
  <rect x="310" y="30" width="240" height="360" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="320" y="22" font-size="11" fill="#616161" font-weight="bold">us-west-2</text>

  <!-- eu-west-1 region -->
  <rect x="600" y="30" width="240" height="360" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="610" y="22" font-size="11" fill="#616161" font-weight="bold">eu-west-1</text>

  <!-- ===== VPC BOXES ===== -->

  <!-- vpc-a (us-east-1) -->
  <rect x="40" y="50" width="200" height="320" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="140" y="72" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-a</text>
  <text x="140" y="87" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.1.0/24</text>

  <!-- vpc-b (us-west-2) -->
  <rect x="330" y="50" width="200" height="320" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="430" y="72" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-b</text>
  <text x="430" y="87" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.2.0/24</text>

  <!-- vpc-c (eu-west-1) -->
  <rect x="620" y="50" width="200" height="320" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="720" y="72" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-c</text>
  <text x="720" y="87" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.3.0/24</text>

  <!-- ===== EC2 INSTANCES ===== -->

  <!-- ec2-a -->
  <rect x="90" y="110" width="100" height="40" fill="#ff9800" rx="4"/>
  <text x="140" y="126" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="bold">ec2-a</text>
  <text x="140" y="141" text-anchor="middle" font-size="9" fill="#ffffff">10.0.1.10</text>

  <!-- ec2-b -->
  <rect x="380" y="110" width="100" height="40" fill="#ff9800" rx="4"/>
  <text x="430" y="126" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="bold">ec2-b</text>
  <text x="430" y="141" text-anchor="middle" font-size="9" fill="#ffffff">10.0.2.10</text>

  <!-- ec2-c -->
  <rect x="670" y="110" width="100" height="40" fill="#ff9800" rx="4"/>
  <text x="720" y="126" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="bold">ec2-c</text>
  <text x="720" y="141" text-anchor="middle" font-size="9" fill="#ffffff">10.0.3.10</text>

  <!-- ===== TGW BOXES ===== -->

  <!-- tgw-a (inside vpc-a) -->
  <rect x="85" y="260" width="110" height="50" fill="#e0f2f1" stroke="#00897b" stroke-width="2" rx="5"/>
  <text x="140" y="280" text-anchor="middle" font-size="10" fill="#004d40" font-weight="bold">tgw-a</text>
  <text x="140" y="296" text-anchor="middle" font-size="8" fill="#00695c">tgw-attach-a</text>
  <text x="140" y="307" text-anchor="middle" font-size="8" fill="#00695c">peer-ca</text>

  <!-- tgw-b (inside vpc-b) -->
  <rect x="375" y="260" width="110" height="50" fill="#e0f2f1" stroke="#00897b" stroke-width="2" rx="5"/>
  <text x="430" y="280" text-anchor="middle" font-size="10" fill="#004d40" font-weight="bold">tgw-b</text>
  <text x="430" y="296" text-anchor="middle" font-size="8" fill="#00695c">tgw-attach-b</text>
  <text x="430" y="307" text-anchor="middle" font-size="8" fill="#00695c">peer-cb</text>

  <!-- tgw-c (inside vpc-c) -->
  <rect x="665" y="260" width="110" height="50" fill="#e0f2f1" stroke="#00897b" stroke-width="2" rx="5"/>
  <text x="720" y="280" text-anchor="middle" font-size="10" fill="#004d40" font-weight="bold">tgw-c</text>
  <text x="720" y="296" text-anchor="middle" font-size="8" fill="#00695c">tgw-attach-c</text>
  <text x="720" y="307" text-anchor="middle" font-size="8" fill="#00695c">peer-ca · peer-cb</text>

  <!-- ===== VPC PEERING LINE: pcx-ab (vpc-a ↔ vpc-b) ===== -->
  <!-- Purple bidirectional arrow between vpc-a and vpc-b at EC2 level -->
  <line x1="192" y1="175" x2="378" y2="175"
        stroke="#7b5ea7" stroke-width="2"
        marker-start="url(#arrow-purple-left)"
        marker-end="url(#arrow-purple-right)"/>
  <rect x="255" y="162" width="60" height="16" fill="#ffffff" rx="3"/>
  <text x="285" y="174" text-anchor="middle" font-size="9" fill="#7b5ea7" font-weight="bold">pcx-ab</text>
  <text x="285" y="187" text-anchor="middle" font-size="8" fill="#555">VPC Peering</text>

  <!-- ===== TGW PEERING LINE: peer-ca (tgw-a ↔ tgw-c) ===== -->
  <!-- Teal bidirectional arrow from tgw-a down and across to tgw-c -->
  <path d="M 140 310 C 140 395, 720 395, 720 310"
        stroke="#00897b" stroke-width="2" fill="none"
        marker-start="url(#arrow-teal-left)"
        marker-end="url(#arrow-teal-right)"/>
  <rect x="355" y="392" width="60" height="14" fill="#ffffff" rx="3"/>
  <text x="385" y="402" text-anchor="middle" font-size="9" fill="#00897b" font-weight="bold">peer-ca</text>
  <text x="385" y="415" text-anchor="middle" font-size="8" fill="#555">TGW Peering</text>

  <!-- ===== TGW PEERING LINE: peer-cb (tgw-b ↔ tgw-c) ===== -->
  <!-- Teal bidirectional arrow from tgw-b across to tgw-c -->
  <path d="M 430 310 C 430 430, 720 430, 720 310"
        stroke="#00897b" stroke-width="2" fill="none"
        marker-start="url(#arrow-teal-left)"
        marker-end="url(#arrow-teal-right)"/>
  <rect x="545" y="427" width="60" height="14" fill="#ffffff" rx="3"/>
  <text x="575" y="437" text-anchor="middle" font-size="9" fill="#00897b" font-weight="bold">peer-cb</text>
  <text x="575" y="450" text-anchor="middle" font-size="8" fill="#555">TGW Peering</text>

  <!-- ===== LEGEND ===== -->
  <rect x="200" y="472" width="460" height="38" fill="#f9f9f9" stroke="#cccccc" stroke-width="1" rx="5"/>
  <text x="220" y="487" font-size="9" fill="#555" font-weight="bold">Legend:</text>

  <!-- Purple line sample -->
  <line x1="268" y1="484" x2="295" y2="484" stroke="#7b5ea7" stroke-width="2"
        marker-start="url(#arrow-purple-left)" marker-end="url(#arrow-purple-right)"/>
  <text x="300" y="487" font-size="9" fill="#555">VPC Peering</text>

  <!-- Teal line sample -->
  <line x1="378" y1="484" x2="405" y2="484" stroke="#00897b" stroke-width="2"
        marker-start="url(#arrow-teal-left)" marker-end="url(#arrow-teal-right)"/>
  <text x="410" y="487" font-size="9" fill="#555">TGW Peering</text>

  <!-- EC2 color sample -->
  <rect x="488" y="477" width="14" height="10" fill="#ff9800" rx="2"/>
  <text x="506" y="487" font-size="9" fill="#555">EC2 instance</text>

  <!-- TGW color sample -->
  <rect x="575" y="477" width="14" height="10" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" rx="2"/>
  <text x="593" y="487" font-size="9" fill="#555">Transit Gateway</text>

  <!-- Subtitle -->
  <text x="430" y="498" text-anchor="middle" font-size="8" fill="#aaaaaa">Part 5 — Cross-Region Architecture: us-east-1, us-west-2, eu-west-1</text>
</svg>
