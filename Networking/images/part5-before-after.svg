<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="860" height="440" fill="#ffffff"/>

  <defs>
    <marker id="arr-purple-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7b5ea7"/>
    </marker>
    <marker id="arr-purple-l" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#7b5ea7"/>
    </marker>
    <marker id="arr-teal-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00897b"/>
    </marker>
    <marker id="arr-teal-l" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#00897b"/>
    </marker>
  </defs>

  <!-- ===== BEFORE section label ===== -->
  <text x="430" y="22" text-anchor="middle" font-size="13" fill="#c62828" font-weight="bold">BEFORE — Three Isolated Regions (No Connectivity)</text>

  <!-- BEFORE: us-east-1 -->
  <rect x="40" y="38" width="210" height="100" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="145" y="53" text-anchor="middle" font-size="10" fill="#616161" font-weight="bold">us-east-1</text>
  <rect x="58" y="60" width="174" height="64" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="145" y="78" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-a</text>
  <text x="145" y="92" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.1.0/24</text>
  <rect x="100" y="100" width="90" height="18" fill="#ff9800" rx="3"/>
  <text x="145" y="113" text-anchor="middle" font-size="9" fill="#ffffff">ec2-a · 10.0.1.10</text>

  <!-- BEFORE: us-west-2 -->
  <rect x="325" y="38" width="210" height="100" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="430" y="53" text-anchor="middle" font-size="10" fill="#616161" font-weight="bold">us-west-2</text>
  <rect x="343" y="60" width="174" height="64" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="430" y="78" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-b</text>
  <text x="430" y="92" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.2.0/24</text>
  <rect x="385" y="100" width="90" height="18" fill="#ff9800" rx="3"/>
  <text x="430" y="113" text-anchor="middle" font-size="9" fill="#ffffff">ec2-b · 10.0.2.10</text>

  <!-- BEFORE: eu-west-1 -->
  <rect x="610" y="38" width="210" height="100" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="715" y="53" text-anchor="middle" font-size="10" fill="#616161" font-weight="bold">eu-west-1</text>
  <rect x="628" y="60" width="174" height="64" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="715" y="78" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-c</text>
  <text x="715" y="92" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.3.0/24</text>
  <rect x="670" y="100" width="90" height="18" fill="#ff9800" rx="3"/>
  <text x="715" y="113" text-anchor="middle" font-size="9" fill="#ffffff">ec2-c · 10.0.3.10</text>

  <!-- BEFORE: "no connectivity" label -->
  <text x="430" y="155" text-anchor="middle" font-size="10" fill="#757575" font-style="italic">No connectivity between any of them.</text>

  <!-- Divider -->
  <line x1="40" y1="172" x2="820" y2="172" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ===== AFTER section label ===== -->
  <text x="430" y="194" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="bold">AFTER — Target State (All Three Regions Connected)</text>

  <!-- AFTER: us-east-1 -->
  <rect x="30" y="208" width="240" height="185" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="150" y="223" text-anchor="middle" font-size="10" fill="#616161" font-weight="bold">us-east-1</text>
  <rect x="48" y="230" width="204" height="152" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="150" y="248" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-a</text>
  <text x="150" y="262" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.1.0/24</text>
  <rect x="100" y="272" width="100" height="18" fill="#ff9800" rx="3"/>
  <text x="150" y="285" text-anchor="middle" font-size="9" fill="#ffffff">ec2-a · 10.0.1.10</text>
  <rect x="95" y="300" width="110" height="40" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" rx="5"/>
  <text x="150" y="317" text-anchor="middle" font-size="9" fill="#004d40" font-weight="bold">tgw-a</text>
  <text x="150" y="330" text-anchor="middle" font-size="8" fill="#00695c">tgw-attach-a · peer-ca</text>

  <!-- AFTER: us-west-2 -->
  <rect x="310" y="208" width="240" height="185" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="430" y="223" text-anchor="middle" font-size="10" fill="#616161" font-weight="bold">us-west-2</text>
  <rect x="328" y="230" width="204" height="152" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="430" y="248" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-b</text>
  <text x="430" y="262" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.2.0/24</text>
  <rect x="380" y="272" width="100" height="18" fill="#ff9800" rx="3"/>
  <text x="430" y="285" text-anchor="middle" font-size="9" fill="#ffffff">ec2-b · 10.0.2.10</text>
  <rect x="375" y="300" width="110" height="40" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" rx="5"/>
  <text x="430" y="317" text-anchor="middle" font-size="9" fill="#004d40" font-weight="bold">tgw-b</text>
  <text x="430" y="330" text-anchor="middle" font-size="8" fill="#00695c">tgw-attach-b · peer-cb</text>

  <!-- AFTER: eu-west-1 -->
  <rect x="590" y="208" width="240" height="185" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="8,4" fill="none" rx="8"/>
  <text x="710" y="223" text-anchor="middle" font-size="10" fill="#616161" font-weight="bold">eu-west-1</text>
  <rect x="608" y="230" width="204" height="152" stroke="#7b5ea7" stroke-width="2" fill="#fdf8ff" rx="7"/>
  <text x="710" y="248" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">vpc-c</text>
  <text x="710" y="262" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.3.0/24</text>
  <rect x="660" y="272" width="100" height="18" fill="#ff9800" rx="3"/>
  <text x="710" y="285" text-anchor="middle" font-size="9" fill="#ffffff">ec2-c · 10.0.3.10</text>
  <rect x="655" y="300" width="110" height="40" fill="#e0f2f1" stroke="#00897b" stroke-width="1.5" rx="5"/>
  <text x="710" y="317" text-anchor="middle" font-size="9" fill="#004d40" font-weight="bold">tgw-c</text>
  <text x="710" y="330" text-anchor="middle" font-size="8" fill="#00695c">tgw-attach-c · peer-ca · peer-cb</text>

  <!-- pcx-ab: VPC Peering vpc-a ↔ vpc-b (at EC2 level ~285) -->
  <line x1="254" y1="281" x2="326" y2="281"
        stroke="#7b5ea7" stroke-width="2"
        marker-start="url(#arr-purple-l)" marker-end="url(#arr-purple-r)"/>
  <rect x="258" y="268" width="54" height="14" fill="#ffffff" rx="2"/>
  <text x="285" y="279" text-anchor="middle" font-size="8" fill="#7b5ea7" font-weight="bold">pcx-ab</text>
  <text x="285" y="291" text-anchor="middle" font-size="7" fill="#555">VPC Peering</text>

  <!-- peer-ca: TGW Peering tgw-a ↔ tgw-c (curved arc below) -->
  <path d="M 150 340 C 150 405, 710 405, 710 340"
        stroke="#00897b" stroke-width="2" fill="none"
        marker-start="url(#arr-teal-l)" marker-end="url(#arr-teal-r)"/>
  <rect x="354" y="400" width="56" height="14" fill="#ffffff" rx="2"/>
  <text x="382" y="411" text-anchor="middle" font-size="8" fill="#00897b" font-weight="bold">peer-ca</text>
  <text x="382" y="423" text-anchor="middle" font-size="7" fill="#555">TGW Peering (A↔C)</text>

  <!-- peer-cb: TGW Peering tgw-b ↔ tgw-c (curved arc below) -->
  <path d="M 430 340 C 430 425, 710 425, 710 340"
        stroke="#00897b" stroke-width="2" fill="none"
        marker-start="url(#arr-teal-l)" marker-end="url(#arr-teal-r)"/>
  <rect x="541" y="420" width="56" height="14" fill="#ffffff" rx="2"/>
  <text x="569" y="431" text-anchor="middle" font-size="8" fill="#00897b" font-weight="bold">peer-cb</text>
  <text x="569" y="443" text-anchor="middle" font-size="7" fill="#555">TGW Peering (B↔C)</text>

</svg>
