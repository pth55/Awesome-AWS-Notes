<svg xmlns="http://www.w3.org/2000/svg" width="720" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="720" height="500" fill="white"/>

  <!-- Region label -->
  <text x="14" y="20" font-size="12" fill="#555" font-weight="bold">AWS REGION: us-east-1</text>

  <!-- VPC boundary -->
  <rect x="10" y="28" width="700" height="460" rx="7" fill="#fdf8ff" stroke="#7b5ea7" stroke-width="2"/>
  <text x="24" y="48" font-size="13" fill="#7b5ea7" font-weight="bold">VPC: my-demo-vpc (192.168.1.0/24)</text>

  <!-- ── PUBLIC SUBNETS ── -->
  <!-- AZ 1a public -->
  <rect x="28" y="58" width="280" height="75" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="44" y="76" font-size="12" fill="#2e7d32" font-weight="bold">public-subnet-1-1a</text>
  <text x="44" y="93" font-size="10" fill="#388e3c">192.168.1.0/26  |  AZ: us-east-1a</text>
  <text x="44" y="110" font-size="10" fill="#888">public-route-table</text>
  <text x="44" y="124" font-size="10" fill="#555">→ IGW for internet traffic</text>

  <!-- AZ 1b public -->
  <rect x="412" y="58" width="280" height="75" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="428" y="76" font-size="12" fill="#2e7d32" font-weight="bold">public-subnet-2-1b</text>
  <text x="428" y="93" font-size="10" fill="#388e3c">192.168.1.128/26  |  AZ: us-east-1b</text>
  <text x="428" y="110" font-size="10" fill="#888">public-route-table</text>
  <text x="428" y="124" font-size="10" fill="#555">→ IGW for internet traffic</text>

  <!-- Public Route Table -->
  <rect x="130" y="160" width="460" height="58" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="360" y="179" font-size="12" fill="#2e7d32" font-weight="bold" text-anchor="middle">public-route-table</text>
  <text x="360" y="196" font-size="10" fill="#555" text-anchor="middle">192.168.1.0/24 → local    |    0.0.0.0/0 → my-demo-igw</text>
  <text x="360" y="211" font-size="10" fill="#888" text-anchor="middle">associated with: public-subnet-1-1a, public-subnet-2-1b</text>

  <!-- Lines from public subnets to public route table -->
  <line x1="168" y1="133" x2="210" y2="160" stroke="#43a047" stroke-width="1.5"/>
  <line x1="552" y1="133" x2="510" y2="160" stroke="#43a047" stroke-width="1.5"/>

  <!-- IGW -->
  <rect x="270" y="246" width="180" height="42" rx="4" fill="#fff8e1" stroke="#ffa000" stroke-width="2"/>
  <text x="360" y="265" font-size="12" fill="#e65100" text-anchor="middle" font-weight="bold">my-demo-igw</text>
  <text x="360" y="281" font-size="10" fill="#888" text-anchor="middle">Internet Gateway</text>

  <!-- Arrow from public route table to IGW -->
  <line x1="360" y1="218" x2="360" y2="246" stroke="#ffa000" stroke-width="2"/>
  <polygon points="360,246 355,236 365,236" fill="#ffa000"/>

  <!-- Internet label -->
  <text x="360" y="328" font-size="13" fill="#1565c0" text-anchor="middle" font-weight="bold">Internet</text>
  <line x1="360" y1="288" x2="360" y2="318" stroke="#1565c0" stroke-width="2"/>
  <polygon points="360,318 355,308 365,308" fill="#1565c0"/>

  <!-- ── PRIVATE SUBNETS ── -->
  <!-- AZ 1a private -->
  <rect x="28" y="348" width="280" height="75" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.5"/>
  <text x="44" y="366" font-size="12" fill="#1565c0" font-weight="bold">private-subnet-1-1a</text>
  <text x="44" y="383" font-size="10" fill="#1976d2">192.168.1.64/26  |  AZ: us-east-1a</text>
  <text x="44" y="400" font-size="10" fill="#888">private-route-table</text>
  <text x="44" y="414" font-size="10" fill="#555">no internet route</text>

  <!-- AZ 1b private -->
  <rect x="412" y="348" width="280" height="75" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.5"/>
  <text x="428" y="366" font-size="12" fill="#1565c0" font-weight="bold">private-subnet-2-1b</text>
  <text x="428" y="383" font-size="10" fill="#1976d2">192.168.1.192/26  |  AZ: us-east-1b</text>
  <text x="428" y="400" font-size="10" fill="#888">private-route-table</text>
  <text x="428" y="414" font-size="10" fill="#555">no internet route</text>

  <!-- Private Route Table -->
  <rect x="130" y="440" width="460" height="38" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2"/>
  <text x="360" y="458" font-size="12" fill="#1565c0" font-weight="bold" text-anchor="middle">private-route-table</text>
  <text x="360" y="472" font-size="10" fill="#555" text-anchor="middle">192.168.1.0/24 → local    |    no 0.0.0.0/0 route</text>

  <!-- Lines from private subnets to private route table -->
  <line x1="168" y1="423" x2="210" y2="440" stroke="#1e88e5" stroke-width="1.5"/>
  <line x1="552" y1="423" x2="510" y2="440" stroke="#1e88e5" stroke-width="1.5"/>

</svg>
