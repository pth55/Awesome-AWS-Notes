<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="540" viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="540" fill="#ffffff"/>

  <!-- Region label -->
  <text x="16" y="18" font-size="10" fill="#9e9e9e" font-style="italic">Region: us-east-1</text>

  <!-- Internet ellipse -->
  <ellipse cx="400" cy="30" rx="60" ry="18" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="400" y="35" text-anchor="middle" font-size="11" fill="#424242" font-weight="bold">Internet</text>

  <!-- Arrow: Internet ↔ IGW -->
  <line x1="400" y1="48" x2="400" y2="66" stroke="#9e9e9e" stroke-width="1.5"/>
  <polygon points="400,72 394,64 406,64" fill="#9e9e9e"/>

  <!-- IGW box -->
  <rect x="272" y="72" width="256" height="44" rx="5" fill="#fff8e1" stroke="#ffa000" stroke-width="1.8"/>
  <text x="400" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Internet Gateway</text>
  <text x="400" y="107" text-anchor="middle" font-size="10" fill="#bf360c">my-igw  ·  attached to my-vpc</text>

  <!-- Arrow: IGW → VPC -->
  <line x1="400" y1="116" x2="400" y2="130" stroke="#9e9e9e" stroke-width="1.5"/>
  <polygon points="400,136 394,128 406,128" fill="#9e9e9e"/>

  <!-- VPC boundary -->
  <rect x="16" y="136" width="768" height="384" rx="7" fill="#fdf8ff" stroke="#7b5ea7" stroke-width="2"/>
  <text x="400" y="156" text-anchor="middle" font-size="12" fill="#7b5ea7" font-weight="bold">VPC: my-vpc  (10.0.0.0/24)  ·  Region: us-east-1</text>

  <!-- AZ boundary -->
  <rect x="30" y="164" width="740" height="344" rx="5" fill="none" stroke="#bdbdbd" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="46" y="180" font-size="10" fill="#757575" font-style="italic">Availability Zone: us-east-1a</text>

  <!-- Public subnet -->
  <rect x="42" y="188" width="716" height="130" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.8"/>
  <text x="400" y="207" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">public-subnet  ·  10.0.0.0/25</text>
  <line x1="42" y1="213" x2="758" y2="213" stroke="#43a047" stroke-width="0.8" opacity="0.5"/>

  <!-- NAT Gateway box -->
  <rect x="60" y="222" width="150" height="70" rx="4" fill="#ff9800"/>
  <text x="135" y="244" text-anchor="middle" font-size="10" fill="white" font-weight="bold">NAT Gateway</text>
  <text x="135" y="259" text-anchor="middle" font-size="9" fill="white">nat-gw</text>
  <text x="135" y="273" text-anchor="middle" font-size="9" fill="white">EIP: 54.10.10.10</text>
  <text x="135" y="285" text-anchor="middle" font-size="9" fill="white">priv IP: 10.0.0.5</text>

  <!-- public-ec2 box -->
  <rect x="240" y="222" width="150" height="70" rx="4" fill="#ff9800"/>
  <text x="315" y="244" text-anchor="middle" font-size="10" fill="white" font-weight="bold">EC2 Instance</text>
  <text x="315" y="259" text-anchor="middle" font-size="9" fill="white">public-ec2</text>
  <text x="315" y="273" text-anchor="middle" font-size="9" fill="white">priv: 10.0.0.10</text>
  <text x="315" y="285" text-anchor="middle" font-size="9" fill="white">has public IP</text>

  <!-- Public route table tag -->
  <rect x="510" y="224" width="240" height="44" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="630" y="241" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">public-rt</text>
  <text x="630" y="257" text-anchor="middle" font-size="9" fill="#2e7d32" font-family="'Courier New', monospace">10.0.0.0/24 → local  ·  0.0.0.0/0 → my-igw</text>

  <!-- Arrow: NAT GW ↕ private subnet (orange dashed) -->
  <line x1="135" y1="292" x2="135" y2="348" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="135,354 129,346 141,346" fill="#ff9800"/>
  <line x1="135" y1="348" x2="135" y2="292" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- Private subnet -->
  <rect x="42" y="358" width="716" height="118" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.8"/>
  <text x="400" y="377" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">private-subnet  ·  10.0.0.128/25</text>
  <line x1="42" y1="383" x2="758" y2="383" stroke="#1e88e5" stroke-width="0.8" opacity="0.5"/>

  <!-- private-ec2 box -->
  <rect x="60" y="392" width="150" height="64" rx="4" fill="#ff9800"/>
  <text x="135" y="414" text-anchor="middle" font-size="10" fill="white" font-weight="bold">EC2 Instance</text>
  <text x="135" y="429" text-anchor="middle" font-size="9" fill="white">private-ec2</text>
  <text x="135" y="444" text-anchor="middle" font-size="9" fill="white">10.0.0.140  ·  no public IP</text>

  <!-- Private route table tag -->
  <rect x="510" y="394" width="240" height="44" rx="3" fill="#bbdefb" stroke="#1e88e5" stroke-width="1"/>
  <text x="630" y="411" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">private-rt</text>
  <text x="630" y="427" text-anchor="middle" font-size="9" fill="#1565c0" font-family="'Courier New', monospace">10.0.0.0/24 → local  ·  0.0.0.0/0 → nat-gw</text>

  <!-- Traffic flow label -->
  <text x="160" y="325" font-size="9" fill="#ff9800" font-style="italic">outbound NAT / return traffic</text>

</svg>
