<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="740" viewBox="0 0 900 740" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="900" height="740" fill="#ffffff"/>

  <!-- ── INTERNET ──────────────────────────────────────────── -->
  <ellipse cx="450" cy="22" rx="52" ry="17" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="450" y="27" text-anchor="middle" font-size="11" fill="#424242" font-weight="bold">Internet</text>

  <!-- Arrow: Internet → IGW -->
  <line x1="450" y1="39" x2="450" y2="55" stroke="#9e9e9e" stroke-width="1.5"/>
  <polygon points="450,61 444,53 456,53" fill="#9e9e9e"/>

  <!-- ── INTERNET GATEWAY ─────────────────────────────────── -->
  <rect x="322" y="61" width="256" height="46" rx="5" fill="#fff8e1" stroke="#ffa000" stroke-width="1.8"/>
  <text x="450" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Internet Gateway</text>
  <text x="450" y="98" text-anchor="middle" font-size="10" fill="#bf360c">my-demo-igw  ·  Highly available, no bandwidth limit</text>

  <!-- Arrow: IGW → VPC -->
  <line x1="450" y1="107" x2="450" y2="119" stroke="#9e9e9e" stroke-width="1.5"/>
  <polygon points="450,125 444,117 456,117" fill="#9e9e9e"/>

  <!-- ── VPC BOUNDARY ─────────────────────────────────────── -->
  <rect x="12" y="125" width="876" height="605" rx="7" fill="#fdf8ff" stroke="#7b5ea7" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" font-size="12" fill="#7b5ea7" font-weight="bold">VPC: my-demo-vpc  (192.168.1.0/24)   ·   Region: us-east-1</text>

  <!-- ── AZ: us-east-1a ──────────────────────────────────── -->
  <rect x="22" y="153" width="426" height="340" rx="5" fill="none" stroke="#bdbdbd" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="36" y="169" font-size="10" fill="#757575" font-style="italic">Availability Zone: us-east-1a</text>

  <!-- ── Public Subnet 1a ── -->
  <rect x="32" y="175" width="406" height="155" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.8"/>
  <text x="235" y="194" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">public-subnet-1-1a  ·  192.168.1.0/26</text>
  <line x1="32" y1="200" x2="438" y2="200" stroke="#43a047" stroke-width="0.8" opacity="0.5"/>

  <!-- NAT Gateway box -->
  <rect x="44" y="208" width="112" height="55" rx="4" fill="#ff9800" stroke="none"/>
  <text x="100" y="228" text-anchor="middle" font-size="10" fill="white" font-weight="bold">NAT Gateway</text>
  <text x="100" y="243" text-anchor="middle" font-size="9" fill="white">my-demo-nat-gw</text>
  <text x="100" y="256" text-anchor="middle" font-size="9" fill="white">EIP: 54.80.x.x</text>

  <!-- EC2 web-server-1 box -->
  <rect x="168" y="208" width="112" height="55" rx="4" fill="#ff9800" stroke="none"/>
  <text x="224" y="228" text-anchor="middle" font-size="10" fill="white" font-weight="bold">EC2 Instance</text>
  <text x="224" y="243" text-anchor="middle" font-size="9" fill="white">public-web-server-1</text>
  <text x="224" y="256" text-anchor="middle" font-size="9" fill="white">priv: .10  pub: 54.x.x.x</text>

  <!-- Public RT tag for subnet -->
  <rect x="300" y="210" width="130" height="26" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="365" y="228" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Route Table</text>
  <text x="44" y="280" font-size="9" fill="#2e7d32">192.168.1.0/24 → local  ·  0.0.0.0/0 → my-demo-igw</text>

  <!-- Arrow: NAT GW down to private subnet (shown between subnets) -->
  <line x1="100" y1="330" x2="100" y2="354" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="100,360 94,352 106,352" fill="#ff9800"/>

  <!-- ── Private Subnet 1a ── -->
  <rect x="32" y="364" width="406" height="119" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.8"/>
  <text x="235" y="383" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">private-subnet-1-1a  ·  192.168.1.64/26</text>
  <line x1="32" y1="389" x2="438" y2="389" stroke="#1e88e5" stroke-width="0.8" opacity="0.5"/>

  <!-- EC2 app-server box -->
  <rect x="44" y="397" width="112" height="55" rx="4" fill="#3f51b5" stroke="none"/>
  <text x="100" y="417" text-anchor="middle" font-size="10" fill="white" font-weight="bold">EC2 Instance</text>
  <text x="100" y="432" text-anchor="middle" font-size="9" fill="white">private-app-server-1</text>
  <text x="100" y="447" text-anchor="middle" font-size="9" fill="white">priv: 192.168.1.80</text>

  <!-- RDS box -->
  <rect x="168" y="397" width="112" height="55" rx="4" fill="#3f51b5" stroke="none"/>
  <text x="224" y="417" text-anchor="middle" font-size="10" fill="white" font-weight="bold">RDS Database</text>
  <text x="224" y="432" text-anchor="middle" font-size="9" fill="white">mysql-primary</text>
  <text x="224" y="447" text-anchor="middle" font-size="9" fill="white">priv: 192.168.1.100</text>

  <rect x="300" y="399" width="130" height="26" rx="3" fill="#bbdefb" stroke="#1e88e5" stroke-width="1"/>
  <text x="365" y="417" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Route Table</text>
  <text x="44" y="468" font-size="9" fill="#1565c0">192.168.1.0/24 → local  ·  0.0.0.0/0 → my-demo-nat-gw</text>

  <!-- ── AZ: us-east-1b ──────────────────────────────────── -->
  <rect x="458" y="153" width="426" height="340" rx="5" fill="none" stroke="#bdbdbd" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="472" y="169" font-size="10" fill="#757575" font-style="italic">Availability Zone: us-east-1b</text>

  <!-- ── Public Subnet 2 ── -->
  <rect x="468" y="175" width="406" height="155" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.8"/>
  <text x="671" y="194" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">public-subnet-2-1b  ·  192.168.1.128/26</text>
  <line x1="468" y1="200" x2="874" y2="200" stroke="#43a047" stroke-width="0.8" opacity="0.5"/>

  <!-- EC2 web-server-2 box -->
  <rect x="548" y="208" width="112" height="55" rx="4" fill="#ff9800" stroke="none"/>
  <text x="604" y="228" text-anchor="middle" font-size="10" fill="white" font-weight="bold">EC2 Instance</text>
  <text x="604" y="243" text-anchor="middle" font-size="9" fill="white">public-web-server-2</text>
  <text x="604" y="256" text-anchor="middle" font-size="9" fill="white">priv: .129  pub: 43.x.x.x</text>

  <rect x="736" y="210" width="130" height="26" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="801" y="228" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Route Table</text>
  <text x="480" y="280" font-size="9" fill="#2e7d32">192.168.1.0/24 → local  ·  0.0.0.0/0 → my-demo-igw</text>

  <!-- ── Private Subnet 2 ── -->
  <rect x="468" y="364" width="406" height="119" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.8"/>
  <text x="671" y="383" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">private-subnet-2-1b  ·  192.168.1.192/26</text>
  <line x1="468" y1="389" x2="874" y2="389" stroke="#1e88e5" stroke-width="0.8" opacity="0.5"/>

  <!-- EC2 app-server-2 -->
  <rect x="480" y="397" width="112" height="55" rx="4" fill="#3f51b5" stroke="none"/>
  <text x="536" y="417" text-anchor="middle" font-size="10" fill="white" font-weight="bold">EC2 Instance</text>
  <text x="536" y="432" text-anchor="middle" font-size="9" fill="white">private-app-server-2</text>
  <text x="536" y="447" text-anchor="middle" font-size="9" fill="white">priv: 192.168.1.200</text>

  <!-- RDS replica -->
  <rect x="604" y="397" width="112" height="55" rx="4" fill="#3f51b5" stroke="none"/>
  <text x="660" y="417" text-anchor="middle" font-size="10" fill="white" font-weight="bold">RDS Database</text>
  <text x="660" y="432" text-anchor="middle" font-size="9" fill="white">mysql-replica</text>
  <text x="660" y="447" text-anchor="middle" font-size="9" fill="white">priv: 192.168.1.220</text>

  <rect x="736" y="399" width="130" height="26" rx="3" fill="#bbdefb" stroke="#1e88e5" stroke-width="1"/>
  <text x="801" y="417" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Route Table</text>
  <text x="480" y="468" font-size="9" fill="#1565c0">192.168.1.0/24 → local  ·  0.0.0.0/0 → my-demo-nat-gw</text>

  <!-- ── ROUTE TABLES SUMMARY ───────────────────────────── -->
  <rect x="22" y="505" width="856" height="210" rx="5" fill="#f9f9f9" stroke="#bdbdbd" stroke-width="1.2"/>
  <text x="450" y="522" text-anchor="middle" font-size="11" fill="#424242" font-weight="bold">Route Tables</text>
  <line x1="22" y1="528" x2="878" y2="528" stroke="#bdbdbd" stroke-width="0.8"/>

  <!-- public-route-table box -->
  <rect x="32" y="536" width="406" height="80" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.2"/>
  <text x="235" y="553" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">public-route-table</text>
  <text x="44" y="568" font-size="9" fill="#333">Associated with:  public-subnet-1-1a  ·  public-subnet-2-1b</text>
  <text x="44" y="582" font-size="9" fill="#555">Destination          Target</text>
  <text x="44" y="596" font-size="9" fill="#555" font-family="'Courier New', monospace">192.168.1.0/24    →   local</text>
  <text x="44" y="608" font-size="9" fill="#555" font-family="'Courier New', monospace">0.0.0.0/0         →   my-demo-igw</text>

  <!-- private-route-table box -->
  <rect x="458" y="536" width="406" height="80" rx="4" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.2"/>
  <text x="661" y="553" text-anchor="middle" font-size="10" fill="#0d47a1" font-weight="bold">private-route-table</text>
  <text x="470" y="568" font-size="9" fill="#333">Associated with:  private-subnet-1-1a  ·  private-subnet-2-1b</text>
  <text x="470" y="582" font-size="9" fill="#555">Destination          Target</text>
  <text x="470" y="596" font-size="9" fill="#555" font-family="'Courier New', monospace">192.168.1.0/24    →   local</text>
  <text x="470" y="608" font-size="9" fill="#555" font-family="'Courier New', monospace">0.0.0.0/0         →   my-demo-nat-gw</text>

  <!-- ── TRAFFIC FLOW SUMMARY ──────────────────────────── -->
  <rect x="32" y="626" width="836" height="80" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="643" text-anchor="middle" font-size="10" fill="#424242" font-weight="bold">Traffic Flow Summary</text>
  <text x="50" y="659" font-size="9" fill="#555">Public instance → Internet:   public-web-server  →  my-demo-igw  →  Internet   (IGW NATs private IP to public IP)</text>
  <text x="50" y="673" font-size="9" fill="#555">Private instance → Internet:  private-app-server  →  NAT Gateway  →  my-demo-igw  →  Internet   (NAT GW hides private IP)</text>
  <text x="50" y="687" font-size="9" fill="#555">Bastion access:               Your Laptop  →  public-web-server (SSH)  →  private-app-server (SSH via private IP)</text>
  <text x="50" y="701" font-size="9" fill="#555">Internet → Private:           BLOCKED — no public IP, no inbound route</text>

  <!-- ── MONITORING NOTE ──────────────────────────────── -->
  <rect x="32" y="715" width="836" height="12" rx="2" fill="#ede7f6" stroke="none"/>
  <text x="450" y="724" text-anchor="middle" font-size="9" fill="#4527a0">Flow Logs: VPC → CloudWatch  /vpc/my-demo-vpc/flow-logs  ·  Security Groups: stateful, instance-level  ·  NACLs: stateless, subnet-level</text>

</svg>
