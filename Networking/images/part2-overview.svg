<?xml version="1.0" encoding="UTF-8"?>
<svg width="840" height="460" viewBox="0 0 840 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="840" height="460" fill="#ffffff"/>

  <!-- ── INTERNET ──────────────────────────────────────────── -->
  <ellipse cx="420" cy="22" rx="52" ry="17" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="420" y="27" text-anchor="middle" font-size="11" fill="#424242" font-weight="bold">Internet</text>

  <!-- Arrow: Internet → IGW -->
  <line x1="420" y1="39" x2="420" y2="55" stroke="#9e9e9e" stroke-width="1.5"/>
  <polygon points="420,61 414,53 426,53" fill="#9e9e9e"/>

  <!-- ── INTERNET GATEWAY ─────────────────────────────────── -->
  <rect x="298" y="61" width="244" height="46" rx="5" fill="#fff8e1" stroke="#ffa000" stroke-width="1.8"/>
  <text x="420" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Internet Gateway</text>
  <text x="420" y="98" text-anchor="middle" font-size="10" fill="#bf360c">my-demo-igw</text>

  <!-- Arrow: IGW → VPC -->
  <line x1="420" y1="107" x2="420" y2="119" stroke="#9e9e9e" stroke-width="1.5"/>
  <polygon points="420,125 414,117 426,117" fill="#9e9e9e"/>

  <!-- ── VPC BOUNDARY ─────────────────────────────────────── -->
  <rect x="12" y="125" width="816" height="325" rx="7" fill="#fdf8ff" stroke="#7b5ea7" stroke-width="2"/>
  <text x="420" y="144" text-anchor="middle" font-size="12" fill="#7b5ea7" font-weight="bold">VPC: my-demo-vpc  (192.168.1.0/24)   ·   Region: us-east-1</text>

  <!-- ── AZ: us-east-1a ──────────────────────────────────── -->
  <rect x="22" y="152" width="394" height="290" rx="5" fill="none" stroke="#bdbdbd" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="36" y="168" font-size="10" fill="#757575" font-style="italic">Availability Zone: us-east-1a</text>

  <!-- Public Subnet 1a -->
  <rect x="32" y="174" width="374" height="126" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.8"/>
  <text x="219" y="193" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">public-subnet-1-1a</text>
  <line x1="32" y1="199" x2="406" y2="199" stroke="#43a047" stroke-width="0.8" opacity="0.5"/>
  <text x="50" y="215" font-size="10" fill="#2e7d32">CIDR:    192.168.1.0/26</text>
  <text x="50" y="231" font-size="10" fill="#2e7d32">Range:   192.168.1.1  –  192.168.1.62   (59 usable IPs)</text>
  <text x="50" y="247" font-size="10" fill="#2e7d32">Purpose: NAT Gateway · EC2 web servers</text>
  <text x="50" y="263" font-size="10" fill="#2e7d32">Route:   0.0.0.0/0  →  my-demo-igw</text>
  <text x="50" y="279" font-size="10" fill="#2e7d32">Auto-assign public IPv4: ENABLED</text>

  <!-- Private Subnet 1a -->
  <rect x="32" y="314" width="374" height="118" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.8"/>
  <text x="219" y="333" text-anchor="middle" font-size="12" fill="#0d47a1" font-weight="bold">private-subnet-1-1a</text>
  <line x1="32" y1="339" x2="406" y2="339" stroke="#1e88e5" stroke-width="0.8" opacity="0.5"/>
  <text x="50" y="355" font-size="10" fill="#1565c0">CIDR:    192.168.1.64/26</text>
  <text x="50" y="371" font-size="10" fill="#1565c0">Range:   192.168.1.65  –  192.168.1.126   (59 usable IPs)</text>
  <text x="50" y="387" font-size="10" fill="#1565c0">Purpose: EC2 app servers · RDS databases</text>
  <text x="50" y="403" font-size="10" fill="#1565c0">Route:   0.0.0.0/0  →  NAT Gateway   (outbound only)</text>

  <!-- ── AZ: us-east-1b ──────────────────────────────────── -->
  <rect x="424" y="152" width="394" height="290" rx="5" fill="none" stroke="#bdbdbd" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="438" y="168" font-size="10" fill="#757575" font-style="italic">Availability Zone: us-east-1b</text>

  <!-- Public Subnet 2 -->
  <rect x="434" y="174" width="374" height="126" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.8"/>
  <text x="621" y="193" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">public-subnet-2-1b</text>
  <line x1="434" y1="199" x2="808" y2="199" stroke="#43a047" stroke-width="0.8" opacity="0.5"/>
  <text x="452" y="215" font-size="10" fill="#2e7d32">CIDR:    192.168.1.128/26</text>
  <text x="452" y="231" font-size="10" fill="#2e7d32">Range:   192.168.1.129  –  192.168.1.190   (59 usable IPs)</text>
  <text x="452" y="247" font-size="10" fill="#2e7d32">Purpose: EC2 web servers</text>
  <text x="452" y="263" font-size="10" fill="#2e7d32">Route:   0.0.0.0/0  →  my-demo-igw</text>
  <text x="452" y="279" font-size="10" fill="#2e7d32">Auto-assign public IPv4: ENABLED</text>

  <!-- Private Subnet 2 -->
  <rect x="434" y="314" width="374" height="118" rx="5" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.8"/>
  <text x="621" y="333" text-anchor="middle" font-size="12" fill="#0d47a1" font-weight="bold">private-subnet-2-1b</text>
  <line x1="434" y1="339" x2="808" y2="339" stroke="#1e88e5" stroke-width="0.8" opacity="0.5"/>
  <text x="452" y="355" font-size="10" fill="#1565c0">CIDR:    192.168.1.192/26</text>
  <text x="452" y="371" font-size="10" fill="#1565c0">Range:   192.168.1.193  –  192.168.1.254   (59 usable IPs)</text>
  <text x="452" y="387" font-size="10" fill="#1565c0">Purpose: EC2 app servers · RDS databases</text>
  <text x="452" y="403" font-size="10" fill="#1565c0">Route:   0.0.0.0/0  →  NAT Gateway   (outbound only)</text>

  <!-- ── LEGEND ────────────────────────────────────────────── -->
  <rect x="12" y="452" width="12" height="6" rx="1" fill="#43a047"/>
  <text x="28" y="458" font-size="9" fill="#555">Public Subnet</text>
  <rect x="110" y="452" width="12" height="6" rx="1" fill="#1e88e5"/>
  <text x="126" y="458" font-size="9" fill="#555">Private Subnet</text>
  <rect x="220" y="452" width="12" height="6" rx="1" fill="#7b5ea7"/>
  <text x="236" y="458" font-size="9" fill="#555">VPC</text>
  <rect x="262" y="452" width="12" height="6" rx="1" fill="#ffa000"/>
  <text x="278" y="458" font-size="9" fill="#555">AWS Service</text>

</svg>
