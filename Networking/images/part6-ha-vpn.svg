<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, Helvetica, sans-serif">

  <rect width="900" height="460" fill="#ffffff"/>
  <text x="450" y="24" text-anchor="middle" font-size="14" fill="#212121" font-weight="bold">High-Availability VPN: Dual-Tunnel + Dual-ISP Pattern</text>

  <!-- ── CGW 1 (Primary ISP) ── -->
  <rect x="10" y="44" width="210" height="142" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.8"/>
  <text x="115" y="63" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">Router 1 (Primary ISP)</text>
  <line x1="10" y1="69" x2="220" y2="69" stroke="#43a047" stroke-width="0.8"/>
  <rect x="25" y="78" width="180" height="50" rx="4" fill="#546e7a"/>
  <text x="115" y="97" text-anchor="middle" font-size="10" fill="white" font-weight="bold">CGW-1 (corp-cgw-primary)</text>
  <text x="115" y="112" text-anchor="middle" font-size="9" fill="white">203.0.113.10  ·  ASN 65000</text>
  <text x="24" y="144" font-size="9" fill="#2e7d32">VPN Connection 1 →</text>
  <text x="24" y="158" font-size="9" fill="#2e7d32">Tunnel A (169.254.10.0/30)</text>
  <text x="24" y="172" font-size="9" fill="#2e7d32">Tunnel B (169.254.11.0/30)</text>

  <!-- ── CGW 2 (Backup ISP) ── -->
  <rect x="10" y="272" width="210" height="142" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1.8"/>
  <text x="115" y="291" text-anchor="middle" font-size="10" fill="#b71c1c" font-weight="bold">Router 2 (Backup ISP)</text>
  <line x1="10" y1="297" x2="220" y2="297" stroke="#e53935" stroke-width="0.8"/>
  <rect x="25" y="306" width="180" height="50" rx="4" fill="#546e7a"/>
  <text x="115" y="325" text-anchor="middle" font-size="10" fill="white" font-weight="bold">CGW-2 (corp-cgw-backup)</text>
  <text x="115" y="340" text-anchor="middle" font-size="9" fill="white">198.51.100.20  ·  ASN 65001</text>
  <text x="24" y="372" font-size="9" fill="#c62828">VPN Connection 2 →</text>
  <text x="24" y="386" font-size="9" fill="#c62828">Tunnel C (169.254.12.0/30)</text>
  <text x="24" y="400" font-size="9" fill="#c62828">Tunnel D (169.254.13.0/30)</text>

  <!-- ── Four Tunnel Lines ── -->
  <!-- Conn 1 Tunnel A (green) -->
  <line x1="222" y1="120" x2="508" y2="186" stroke="#43a047" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="510,187 500,183 503,192" fill="#43a047"/>
  <text x="360" y="144" text-anchor="middle" font-size="8" fill="#2e7d32">Tunnel A</text>

  <!-- Conn 1 Tunnel B (green) -->
  <line x1="222" y1="148" x2="508" y2="214" stroke="#43a047" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="510,215 500,211 503,220" fill="#43a047"/>
  <text x="360" y="172" text-anchor="middle" font-size="8" fill="#2e7d32">Tunnel B</text>

  <!-- Conn 2 Tunnel C (red) -->
  <line x1="222" y1="336" x2="508" y2="248" stroke="#e53935" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="510,247 500,247 503,256" fill="#e53935"/>
  <text x="360" y="302" text-anchor="middle" font-size="8" fill="#c62828">Tunnel C</text>

  <!-- Conn 2 Tunnel D (red) -->
  <line x1="222" y1="360" x2="508" y2="272" stroke="#e53935" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="510,271 500,271 503,280" fill="#e53935"/>
  <text x="360" y="328" text-anchor="middle" font-size="8" fill="#c62828">Tunnel D</text>

  <!-- ── VGW / TGW ── -->
  <rect x="512" y="160" width="140" height="142" rx="6" fill="#e0f2f1" stroke="#00897b" stroke-width="2"/>
  <text x="582" y="180" text-anchor="middle" font-size="10" fill="#00695c" font-weight="bold">VGW / TGW</text>
  <line x1="512" y1="186" x2="652" y2="186" stroke="#00897b" stroke-width="0.8" opacity="0.5"/>
  <text x="582" y="204" text-anchor="middle" font-size="9" fill="#00897b">4 tunnels total</text>
  <text x="582" y="220" text-anchor="middle" font-size="9" fill="#555">2 per CGW</text>
  <text x="582" y="238" text-anchor="middle" font-size="8" fill="#2e7d32">Conn-1 (primary)</text>
  <text x="582" y="252" text-anchor="middle" font-size="8" fill="#e53935">Conn-2 (backup)</text>
  <text x="582" y="272" text-anchor="middle" font-size="8" fill="#00897b">Failover: ~60s</text>
  <text x="582" y="288" text-anchor="middle" font-size="8" fill="#555">(BGP detects faster)</text>

  <!-- Arrow VGW → VPC -->
  <line x1="654" y1="231" x2="700" y2="231" stroke="#7b5ea7" stroke-width="2"/>
  <polygon points="702,231 693,226 693,236" fill="#7b5ea7"/>

  <!-- ── VPC ── -->
  <rect x="704" y="80" width="186" height="302" rx="7" fill="#fdf8ff" stroke="#7b5ea7" stroke-width="2"/>
  <text x="797" y="100" text-anchor="middle" font-size="11" fill="#7b5ea7" font-weight="bold">VPC</text>
  <text x="797" y="115" text-anchor="middle" font-size="9" fill="#7b5ea7">10.0.0.0/16</text>

  <!-- Subnet + EC2 inside VPC -->
  <rect x="718" y="128" width="158" height="70" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.3"/>
  <text x="797" y="146" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Public Subnet</text>
  <text x="797" y="163" text-anchor="middle" font-size="8" fill="#1b5e20">10.0.1.0/24</text>
  <text x="797" y="179" text-anchor="middle" font-size="8" fill="#2e7d32">EC2 · 10.0.1.10</text>

  <rect x="718" y="214" width="158" height="70" rx="4" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.3"/>
  <text x="797" y="232" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Private Subnet</text>
  <text x="797" y="249" text-anchor="middle" font-size="8" fill="#0d47a1">10.0.2.0/24</text>
  <text x="797" y="265" text-anchor="middle" font-size="8" fill="#1565c0">App servers · RDS</text>

  <!-- VPC Route note -->
  <rect x="718" y="298" width="158" height="60" rx="3" fill="#ede7f6"/>
  <text x="797" y="314" text-anchor="middle" font-size="9" fill="#4527a0" font-weight="bold">Route Table</text>
  <text x="727" y="330" font-size="8" fill="#4527a0" font-family="'Courier New', monospace">192.168.0.0/16</text>
  <text x="727" y="344" font-size="8" fill="#4527a0" font-family="'Courier New', monospace">  → vgw-1</text>

  <!-- ── Failure modes note ── -->
  <rect x="10" y="432" width="880" height="24" rx="3" fill="#f9f9f9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="448" text-anchor="middle" font-size="9" fill="#424242">Failure modes covered:  ISP-1 down → Conn-2 takes over  ·  Tunnel A down → Tunnel B stays up  ·  CGW-1 failure → CGW-2 takes over  ·  All 4 combinations protected</text>

</svg>
